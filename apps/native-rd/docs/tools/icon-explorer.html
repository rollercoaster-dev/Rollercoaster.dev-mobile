<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Badge icon explorer — phosphor-react-native</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/bold/style.css"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/duotone/style.css"
    />
    <style>
      :root {
        --bg: #fffbe8;
        --fg: #1a1a1a;
        --border: #1a1a1a;
        --accent: #2563eb;
        --accent-fg: #fffbe8;
        --in-app: #16a34a;
        --candidate: #d97706;
        --selected: #db2777;
        --shadow: 4px 4px 0 0 var(--border);
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #1a1a1a;
          --fg: #f5f5f5;
          --border: #f5f5f5;
        }
      }
      * { box-sizing: border-box; }
      body {
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          "Instrument Sans",
          sans-serif;
        background: var(--bg);
        color: var(--fg);
        margin: 0;
        padding: 0;
      }
      header {
        position: sticky;
        top: 0;
        background: var(--bg);
        border-bottom: 3px solid var(--border);
        padding: 14px 20px;
        z-index: 10;
      }
      h1 {
        margin: 0 0 6px;
        font-size: 18px;
        letter-spacing: -0.01em;
      }
      .stats {
        font-size: 12px;
        opacity: 0.75;
        margin-bottom: 10px;
      }
      .legend {
        display: inline-flex;
        gap: 14px;
        font-size: 12px;
        margin-bottom: 10px;
      }
      .dot {
        display: inline-block;
        width: 10px;
        height: 10px;
        border: 2px solid var(--border);
        margin-right: 4px;
        vertical-align: middle;
      }
      .dot.in-app { background: var(--in-app); }
      .dot.candidate { background: var(--candidate); }
      .dot.selected { background: var(--selected); }
      .controls {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        align-items: center;
      }
      input[type="search"] {
        font-size: 14px;
        padding: 8px 12px;
        border: 2px solid var(--border);
        background: var(--bg);
        color: var(--fg);
        min-width: 240px;
        box-shadow: var(--shadow);
      }
      .filter {
        display: inline-flex;
        gap: 6px;
        flex-wrap: wrap;
      }
      .chip {
        padding: 6px 10px;
        border: 2px solid var(--border);
        background: var(--bg);
        color: var(--fg);
        cursor: pointer;
        font-size: 12px;
        font-family: inherit;
      }
      .chip.active {
        background: var(--accent);
        color: var(--accent-fg);
      }
      .selected-bar {
        margin-top: 10px;
        padding: 10px;
        border: 2px solid var(--border);
        background: var(--bg);
        box-shadow: var(--shadow);
        min-height: 38px;
      }
      .selected-bar .label {
        font-size: 12px;
        font-weight: bold;
        margin-right: 8px;
      }
      .selected-bar .name-chip {
        display: inline-block;
        padding: 3px 8px;
        margin: 2px;
        border: 2px solid var(--border);
        background: var(--selected);
        color: white;
        font-size: 12px;
        cursor: pointer;
      }
      .selected-bar button {
        padding: 6px 10px;
        border: 2px solid var(--border);
        background: var(--fg);
        color: var(--bg);
        cursor: pointer;
        font-size: 12px;
        font-family: inherit;
        margin-left: 8px;
      }
      main {
        padding: 20px;
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
        gap: 10px;
      }
      .tile {
        border: 2px solid var(--border);
        background: var(--bg);
        padding: 10px 8px;
        text-align: center;
        cursor: pointer;
        position: relative;
        transition: transform 0.05s;
      }
      .tile:hover { transform: translate(-2px, -2px); box-shadow: var(--shadow); }
      .tile.in-app { border-color: var(--in-app); border-width: 3px; }
      .tile.candidate { border-color: var(--candidate); border-width: 3px; }
      .tile.selected {
        background: var(--selected);
        color: white;
        border-color: var(--selected);
      }
      .tile .ph,
      .tile .ph-bold,
      .tile .ph-duotone {
        font-size: 36px;
        display: block;
        margin-bottom: 6px;
      }
      .tile .name {
        font-size: 11px;
        word-break: break-word;
        line-height: 1.2;
      }
      .tile .tag {
        position: absolute;
        top: 2px;
        right: 2px;
        font-size: 9px;
        padding: 1px 4px;
        border: 1px solid var(--border);
        background: var(--bg);
        color: var(--fg);
        text-transform: uppercase;
      }
      .tile.in-app .tag { background: var(--in-app); color: white; border-color: var(--in-app); }
      .tile.candidate .tag { background: var(--candidate); color: white; border-color: var(--candidate); }
      .empty {
        grid-column: 1 / -1;
        text-align: center;
        padding: 40px;
        opacity: 0.6;
      }
      dialog {
        border: 3px solid var(--border);
        background: var(--bg);
        color: var(--fg);
        padding: 0;
        box-shadow: 8px 8px 0 0 var(--border);
        max-width: 600px;
        width: 90vw;
      }
      dialog::backdrop {
        background: rgba(0, 0, 0, 0.5);
      }
      dialog header {
        padding: 12px;
        border-bottom: 2px solid var(--border);
        position: static;
      }
      dialog pre {
        margin: 0;
        padding: 14px;
        font-size: 12px;
        font-family: ui-monospace, "DM Mono", monospace;
        white-space: pre-wrap;
        word-break: break-all;
        background: rgba(0, 0, 0, 0.05);
        max-height: 60vh;
        overflow: auto;
      }
      dialog footer {
        padding: 10px;
        text-align: right;
        border-top: 2px solid var(--border);
      }
      dialog button {
        padding: 6px 12px;
        border: 2px solid var(--border);
        background: var(--bg);
        color: var(--fg);
        cursor: pointer;
        font-family: inherit;
      }
      dialog button.primary {
        background: var(--accent);
        color: var(--accent-fg);
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Badge icon explorer</h1>
      <div class="stats">
        <span id="stat-total"></span> phosphor icons •
        <span id="stat-in-app"></span> already in app •
        <span id="stat-candidate"></span> suggested candidates •
        <span class="legend">
          <span><span class="dot in-app"></span>in app</span>
          <span><span class="dot candidate"></span>suggested</span>
          <span><span class="dot selected"></span>selected</span>
        </span>
      </div>
      <div class="controls">
        <input
          type="search"
          id="search"
          placeholder="filter by name (e.g. boxing, gym, calendar)"
          autocomplete="off"
        />
        <div class="filter" id="filter">
          <button class="chip active" data-filter="all">All</button>
          <button class="chip" data-filter="new">Not in app</button>
          <button class="chip" data-filter="candidate">Suggested</button>
          <button class="chip" data-filter="in-app">In app</button>
          <button class="chip" data-filter="selected">Selected</button>
        </div>
        <div class="filter" id="weight">
          <button class="chip active" data-weight="regular">Regular</button>
          <button class="chip" data-weight="bold">Bold</button>
          <button class="chip" data-weight="duotone">Duotone</button>
        </div>
      </div>
      <div class="selected-bar" id="selected-bar">
        <span class="label">Selected to add (0):</span>
        <span id="selected-chips"></span>
        <button id="export-btn" disabled>Export registry snippet</button>
        <button id="clear-btn" disabled>Clear</button>
      </div>
    </header>
    <main id="grid"></main>

    <dialog id="export-dialog">
      <header>
        <strong>Paste this into your add-to-registry PR</strong>
      </header>
      <pre id="export-content"></pre>
      <footer>
        <button id="copy-btn" class="primary">Copy</button>
        <button id="close-btn">Close</button>
      </footer>
    </dialog>

const IN_APP = new Set(["Airplane","Aperture","AppleLogo","Atom","Backpack","Barbell","Baseball","Basketball","Bicycle","Binoculars","Bird","Book","BookBookmark","BookOpen","Books","BowlFood","BoxingGlove","Brain","Browsers","Bug","BugBeetle","Butterfly","Camera","Certificate","Chalkboard","ChalkboardTeacher","Champagne","ChartBar","ChartLineUp","ChatCircle","ChatDots","Chats","CloudArrowUp","CloudSun","Code","CodeBlock","Coin","Coins","Compass","Confetti","Cpu","Crown","CrownSimple","Cube","CurrencyDollar","Database","Desktop","DeviceMobile","Drop","EnvelopeSimple","Exam","FilmStrip","Fire","FirstAid","Fish","Flag","FlagBanner","FlagCheckered","Flask","Flower","FlowerLotus","Football","Gear","GearSix","GitBranch","GitCommit","GitMerge","GitPullRequest","Globe","GraduationCap","Guitar","HandFist","HandHeart","Handshake","Heart","Heartbeat","House","Layout","Leaf","Lightbulb","LightbulbFilament","Lightning","MagicWand","MagnifyingGlass","MapPin","MathOperations","Medal","MedalMilitary","Megaphone","Microphone","Moon","Mountains","MusicNote","MusicNotes","Notebook","PaintBrush","PaintRoller","Palette","PawPrint","Pen","Pencil","PencilSimple","PersonSimpleBike","PersonSimpleRun","PersonSimpleWalk","PianoKeys","PiggyBank","Pill","Plant","Plugs","Presentation","Rainbow","Robot","Rocket","RocketLaunch","Scales","Scissors","Seal","SealCheck","Shapes","ShareNetwork","ShieldCheck","ShieldStar","Smiley","SmileyWink","Snowflake","SoccerBall","Sparkle","Star","StarFour","Student","Sun","SunHorizon","SwimmingPool","Target","TennisBall","Tent","Terminal","TerminalWindow","TestTube","ThumbsUp","Translate","Tree","TrendUp","Trophy","UserCircle","Users","VideoCamera","Wallet","Waves","Wrench","YinYang"]);
const CANDIDATES = new Set(["Ranking","HandsClapping","Diamond","Crosshair","Sword","Anchor","Lighthouse","PersonSimpleSki","PersonSimpleHike","PersonArmsSpread","HandsPraying","Eye","EyeClosed","MaskHappy","MaskSad","Cookie","Pizza","Hamburger","Carrot","ForkKnife","Egg","Bread","IceCream","Coffee","Hamburger","Hammer","Toolbox","Ruler","Briefcase","Bandaids","Clock","ClockCountdown","ClockClockwise","Timer","Hourglass","CalendarCheck","ListChecks","CheckSquare","Checks","ArrowsClockwise","ArrowClockwise","Repeat","Infinity","Recycle","SmileyMeh","SmileySad","SmileyXEyes","SmileyNervous","SmileySticker","Headphones","SpeakerHigh","PuzzlePiece","Campfire","Ladder","Tag","Bookmark","BookmarkSimple","HeartStraight"]);

      // ---- Helpers ----
      function toKebab(name) {
        return name
          .replace(/([a-z0-9])([A-Z])/g, "$1-$2")
          .replace(/([A-Z])([A-Z][a-z])/g, "$1-$2")
          .toLowerCase();
      }

      function classify(name) {
        if (IN_APP.has(name)) return "in-app";
        if (CANDIDATES.has(name)) return "candidate";
        return "new";
      }

      // ---- State ----
      const LS_KEY = "rd-icon-explorer.selected.v1";
      const selected = new Set(JSON.parse(localStorage.getItem(LS_KEY) || "[]"));
      let filter = "all";
      let weight = "regular";
      let search = "";

      function persist() {
        localStorage.setItem(LS_KEY, JSON.stringify([...selected]));
      }

      // ---- Rendering ----
      const grid = document.getElementById("grid");
      const tileMap = new Map(); // name -> element

      function weightClass() {
        if (weight === "bold") return "ph-bold";
        if (weight === "duotone") return "ph-duotone";
        return "ph";
      }

      function buildGrid() {
        grid.innerHTML = "";
        tileMap.clear();
        const wc = weightClass();
        for (const name of ALL_ICONS) {
          const kind = classify(name);
          const tile = document.createElement("div");
          tile.className = "tile " + kind;
          tile.dataset.name = name;
          tile.dataset.kind = kind;
          tile.dataset.nameLower = name.toLowerCase();
          tile.title = name;
          tile.innerHTML = `
            <i class="${wc} ph-${toKebab(name)}"></i>
            <div class="name">${name}</div>
            ${kind !== "new" ? `<span class="tag">${kind === "in-app" ? "in app" : "suggest"}</span>` : ""}
          `;
          tile.addEventListener("click", () => toggle(name));
          if (selected.has(name)) tile.classList.add("selected");
          tileMap.set(name, tile);
          grid.appendChild(tile);
        }
        applyFilter();
        updateSelectedBar();
        updateStats();
      }

      function applyFilter() {
        const s = search.trim().toLowerCase();
        let shown = 0;
        for (const [name, tile] of tileMap) {
          const kind = tile.dataset.kind;
          const isSelected = selected.has(name);
          let pass = true;
          if (filter === "new" && kind !== "new") pass = false;
          if (filter === "candidate" && kind !== "candidate") pass = false;
          if (filter === "in-app" && kind !== "in-app") pass = false;
          if (filter === "selected" && !isSelected) pass = false;
          if (s && !tile.dataset.nameLower.includes(s)) pass = false;
          tile.style.display = pass ? "" : "none";
          if (pass) shown++;
        }
        let empty = document.querySelector(".empty");
        if (shown === 0) {
          if (!empty) {
            empty = document.createElement("div");
            empty.className = "empty";
            empty.textContent = "No icons match.";
            grid.appendChild(empty);
          }
        } else if (empty) {
          empty.remove();
        }
      }

      function toggle(name) {
        if (IN_APP.has(name)) return; // Already in app — nothing to do
        if (selected.has(name)) selected.delete(name);
        else selected.add(name);
        const tile = tileMap.get(name);
        tile.classList.toggle("selected", selected.has(name));
        persist();
        updateSelectedBar();
      }

      function updateSelectedBar() {
        const chips = document.getElementById("selected-chips");
        const label = document.querySelector(".selected-bar .label");
        const exportBtn = document.getElementById("export-btn");
        const clearBtn = document.getElementById("clear-btn");
        chips.innerHTML = "";
        for (const name of [...selected].sort()) {
          const c = document.createElement("span");
          c.className = "name-chip";
          c.textContent = name;
          c.title = "Click to remove";
          c.addEventListener("click", () => toggle(name));
          chips.appendChild(c);
        }
        label.textContent = `Selected to add (${selected.size}):`;
        exportBtn.disabled = selected.size === 0;
        clearBtn.disabled = selected.size === 0;
      }

      function updateStats() {
        document.getElementById("stat-total").textContent = ALL_ICONS.length;
        document.getElementById("stat-in-app").textContent = IN_APP.size;
        document.getElementById("stat-candidate").textContent = CANDIDATES.size;
      }

      // ---- Wire up controls ----
      document.getElementById("search").addEventListener("input", (e) => {
        search = e.target.value;
        applyFilter();
      });
      document.getElementById("filter").addEventListener("click", (e) => {
        const btn = e.target.closest("[data-filter]");
        if (!btn) return;
        filter = btn.dataset.filter;
        document
          .querySelectorAll("#filter .chip")
          .forEach((c) => c.classList.toggle("active", c === btn));
        applyFilter();
      });
      document.getElementById("weight").addEventListener("click", (e) => {
        const btn = e.target.closest("[data-weight]");
        if (!btn) return;
        weight = btn.dataset.weight;
        document
          .querySelectorAll("#weight .chip")
          .forEach((c) => c.classList.toggle("active", c === btn));
        const wc = weightClass();
        for (const tile of tileMap.values()) {
          const i = tile.querySelector("i");
          i.className = `${wc} ph-${toKebab(tile.dataset.name)}`;
        }
      });
      document.getElementById("clear-btn").addEventListener("click", () => {
        selected.clear();
        persist();
        for (const t of tileMap.values()) t.classList.remove("selected");
        updateSelectedBar();
        if (filter === "selected") applyFilter();
      });

      // ---- Export ----
      const dialog = document.getElementById("export-dialog");
      const exportContent = document.getElementById("export-content");

      function buildSnippet() {
        const names = [...selected].sort();
        const importBlock = names.join(",\n  ");
        const registryBlock = names.join(",\n  ");
        const indexEntries = names
          .map((n) => {
            const words = n
              .replace(/([a-z0-9])([A-Z])/g, "$1 $2")
              .toLowerCase()
              .split(" ");
            const kw = JSON.stringify([
              ...new Set([n.toLowerCase(), ...words]),
            ]);
            return `  {
    name: "${n}",
    keywords: ${kw},
    categories: ["achievement"], // TODO: adjust
  },`;
          })
          .join("\n");
        return `// 1) src/badges/iconRegistry.ts — add to phosphor-react-native imports:
import {
  ${importBlock},
} from "phosphor-react-native";

// 2) src/badges/iconRegistry.ts — add to ICON_REGISTRY object:
  ${registryBlock},

// 3) src/badges/iconIndex.ts — add to CURATED_ICONS array (review categories!):
${indexEntries}

// 4) src/badges/__tests__/IconPicker.test.tsx — add to iconNames mock array:
  ${names.map((n) => `"${n}"`).join(",\n  ")},
`;
      }

      document.getElementById("export-btn").addEventListener("click", () => {
        exportContent.textContent = buildSnippet();
        dialog.showModal();
      });
      document.getElementById("close-btn").addEventListener("click", () =>
        dialog.close(),
      );
      document.getElementById("copy-btn").addEventListener("click", async () => {
        await navigator.clipboard.writeText(exportContent.textContent);
        const btn = document.getElementById("copy-btn");
        const t = btn.textContent;
        btn.textContent = "Copied!";
        setTimeout(() => (btn.textContent = t), 1200);
      });

      // ---- Init ----
      buildGrid();
    </script>
  </body>
