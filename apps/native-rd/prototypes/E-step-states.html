<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PROTOTYPE — E: Step states — palette + behavior</title>
<!--
  PROTOTYPE — throwaway. Phase B Stage 1, E: Step states.

  FOUR views in ONE file. palette + behavior shape the states; focus + timeline
  put them on the two real surfaces that actually render step state in-app:
    ?view=palette  — STATIC parallel gallery. The candidate state set as pills
                     rendered across light-default / highContrast / autismFriendly
                     side by side, with shared inline rename. Answers:
                       Q1 which states earn a place (the four-state spine)
                       Q2 do the base names read right ("pending" = db-speak?)
                       Q3 does colour + word stay legible across the palettes
                       Q4 does renaming make a state feel like the user's
    ?view=behavior — INTERACTIVE clickable phone driving Tomás's practice panel.
                     Tap a step's pill to set its state; watch the app-maintained
                     in-progress POINTER auto-advance when you pause/complete; watch
                     "one next step" route past a paused step; pause a step by hand;
                     hit the all-paused edge. The no-auto-judgment guardrail E
                     actually tests: `paused` is only ever user-set, never by the
                     app. (There is deliberately NO time element — dates/deadlines
                     are Stage 3 / B, and nothing here advances with the clock.)
                     Answers Q5 (paused routing) and Q6 (auto-advance reads as
                     helpful vs deciding-for-you).
    ?view=focus    — FocusModeScreen shape: mini-timeline strip + swipeable card
                     carousel + progress dots. The dots and mini-timeline nodes
                     carry a state with COLOUR ALONE (no word beside) — the stress
                     on the "colour is never the sole carrier" guardrail that the
                     pill-based views couldn't apply. "Current" is the centred card
                     (NOT stored), so it can disagree with a paused pill. ←/→ move
                     the card, ↑/↓ cycle palettes.
    ?view=timeline — TimelineJourneyScreen shape: a progress bar + "X of Y complete"
                     over a vertical run of big nodes. Per design decision the nodes
                     use the STATE colour language (the pill's), NOT the real screen's
                     hard-wired palette.blue600 — so a state is ONE colour everywhere
                     (pill, dot, mini node, big node). Watch what "X of Y complete"
                     reads like once a step is `paused`.

  Feature shape: docs/plans/phase-b-feature-shapes.md §E
  Record:        docs/plans/phase-b-prototype-records/E-step-states.md
  Open:          open apps/native-rd/prototypes/E-step-states.html
  ← / → cycle palettes (behavior/timeline) or move the card (focus). No
  persistence — refresh resets.

  Palette values mirrored & VERIFIED 2026-06-14 against:
    packages/design-tokens/src/themes/{high-contrast,autism-friendly}.json
    packages/design-tokens/build/unistyles/variants.ts
  KEY FINDING baked into the palette view: accentYellow / accentMint /
  accentPurpleLight are NOT in the highContrast or autismFriendly override sets,
  so a pill coloured with them renders IDENTICALLY across all three palettes —
  it does not desaturate for autismFriendly nor maximise contrast for
  highContrast. (StatusBadge's existing "active"/"completed" use exactly these.)
-->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anybody:wght@600;700;800;900&family=Instrument+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  /* ===== palette token blocks — resolved per the design-tokens build ===== *
   * Only the roles a state pill + its surrounding chrome touch. Each .pal-*   *
   * sets the SAME variable names so the pill markup is palette-agnostic.      *
   * accentYellow / accentMint / accentPurpleLight are intentionally identical *
   * across all three — that is the verified Q3 finding, not an oversight.     */
  .pal-default {
    --bg:#fafafa; --card:#ffffff; --bg2:#f0f0f0; --bg3:#f5f5f5;
    --text:#262626; --muted:#737373; --border:#262626; --border-subtle:#d4d4d4;
    --bw:2px; --bw-strong:2.5px; --shadow:2px 2px 0 rgba(10,10,10,.8); --shadow-md:3px 3px 0 rgba(10,10,10,.8);
    /* state swatches */
    --c-pending-bg:#f0f0f0;  --c-pending-text:#737373;
    --c-progress-bg:#ffe50c; --c-progress-text:#0a0a0a;   /* accentYellow + climb.text */
    --c-paused-bg:#ede9fe;   --c-paused-text:#5b21b6;      /* accentPurpleLight */
    --c-done-bg:#d4f4e7;     --c-done-text:#0a0a0a;        /* accentMint + relief.text */
    --pal-name:"light-default · The Full Ride";
  }
  .pal-hc {
    --bg:#ffffff; --card:#ffffff; --bg2:#f0f0f0; --bg3:#000000;
    --text:#000000; --muted:#000000; --border:#000000; --border-subtle:#606060;
    --bw:3px; --bw-strong:3px; --shadow:none; --shadow-md:none;
    --c-pending-bg:#f0f0f0;  --c-pending-text:#000000;     /* muted bg + muted-fg #000 */
    --c-progress-bg:#ffe50c; --c-progress-text:#000000;    /* accentYellow PASSES THROUGH */
    --c-paused-bg:#ede9fe;   --c-paused-text:#000000;      /* accentPurpleLight PASSES THROUGH */
    --c-done-bg:#d4f4e7;     --c-done-text:#000000;        /* accentMint PASSES THROUGH */
    --pal-name:"light-highContrast · Bold Ink";
  }
  .pal-autism {
    --bg:#f7f7f7; --card:#f7f7f7; --bg2:#eeeeee; --bg3:#e0e0e0;
    --text:#333333; --muted:#666666; --border:#dddddd; --border-subtle:#e0e0e0;
    --bw:1px; --bw-strong:1px; --shadow:none; --shadow-md:none;
    --c-pending-bg:#eeeeee;  --c-pending-text:#666666;
    --c-progress-bg:#ffe50c; --c-progress-text:#444444;    /* accentYellow PASSES THROUGH — neon in a muted palette */
    --c-paused-bg:#ede9fe;   --c-paused-text:#5d4d7d;      /* accentPurpleLight PASSES THROUGH */
    --c-done-bg:#d4f4e7;     --c-done-text:#444444;        /* accentMint PASSES THROUGH */
    --pal-name:"light-autismFriendly · Still Water";
  }

  :root {
    --headline:'Anybody', system-ui, sans-serif;
    --body:'Instrument Sans', system-ui, sans-serif;
    --mono:'DM Mono', monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body { background:#e8e4da; font-family: var(--body); color:#262626; padding: 26px 20px 90px; }

  /* ===== page chrome — NOT part of the design under test ===== */
  .page-header { max-width: 1180px; margin: 0 auto 16px; }
  .page-header h1 { font-family: var(--headline); font-weight: 900; font-size: 25px; letter-spacing: -0.02em; margin: 0 0 6px; }
  .page-header p { margin: 0 0 4px; font-size: 13.5px; color: #4a4a4a; max-width: 920px; line-height: 1.5; }
  .proto-tag { display:inline-block; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.08em; background:#dc2626; color:#fff; border:2px solid #0a0a0a; padding:2px 8px; margin-bottom:8px; }
  .controls { max-width: 1180px; margin: 0 auto 22px; display:flex; flex-wrap:wrap; gap:10px 22px; align-items:center; }
  .ctl-group { display:flex; align-items:center; gap:6px; }
  .ctl-label { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.08em; color:#555; margin-right:2px; }
  .seg { font-family: var(--body); font-size:12.5px; font-weight:600; cursor:pointer; background:#fff; color:#262626; border:2px solid #0a0a0a; padding:5px 10px; box-shadow:2px 2px 0 rgba(0,0,0,.8); }
  .seg.on { background:#ffe50c; }
  .seg.warn { background:#d4f4e7; }
  .seg:active { transform: translate(1px,1px); box-shadow:1px 1px 0 rgba(0,0,0,.8); }

  .finding { max-width:1180px; margin:0 auto 20px; background:#fff7c2; border:2.5px solid #0a0a0a; box-shadow:3px 3px 0 rgba(0,0,0,.8); padding:11px 15px; font-size:12.5px; line-height:1.55; }
  .finding b { font-family: var(--headline); }
  .finding code { font-family: var(--mono); font-size:11.5px; background:#fff; border:1px solid #0a0a0a; padding:0 4px; }

  /* ===== the state pill — mirrors StatusBadge.styles.ts ===== */
  .pill {
    display:inline-flex; align-items:center; gap:6px; align-self:flex-start;
    border-radius:999px; border:var(--bw) solid var(--border);
    padding:3px 11px; box-shadow: var(--shadow);
    font-family: var(--body); font-size:11px; font-weight:700;
    text-transform:uppercase; letter-spacing:.06em; white-space:nowrap;
  }
  .pill .dot { width:8px; height:8px; border-radius:50%; border:1px solid rgba(0,0,0,.35); flex:0 0 auto; }
  .pill.s-pending  { background:var(--c-pending-bg);  color:var(--c-pending-text); }
  .pill.s-progress { background:var(--c-progress-bg); color:var(--c-progress-text); }
  .pill.s-paused   { background:var(--c-paused-bg);   color:var(--c-paused-text); }
  .pill.s-done     { background:var(--c-done-bg);     color:var(--c-done-text); }

  /* ===== PALETTE VIEW ===== */
  .pal-controls { max-width:1180px; margin:0 auto 18px; background:#fff; border:2.5px solid #0a0a0a; box-shadow:3px 3px 0 rgba(0,0,0,.8); padding:12px 16px; }
  .pal-controls h2 { font-family:var(--headline); font-size:15px; margin:0 0 10px; text-transform:uppercase; letter-spacing:.04em; }
  .namerow { display:flex; align-items:center; gap:10px; padding:5px 0; border-bottom:1px solid #e0e0e0; font-size:12.5px; }
  .namerow:last-child { border-bottom:none; }
  .namerow .key { font-family:var(--mono); font-size:11px; color:#888; width:104px; flex:0 0 auto; }
  .namerow .base { color:#555; width:120px; flex:0 0 auto; }
  .namerow input[type=text] { font-family:var(--body); font-size:13px; font-weight:600; border:2px solid #0a0a0a; padding:5px 9px; width:170px; }
  .namerow .swatch { width:18px; height:18px; border-radius:4px; border:1.5px solid #0a0a0a; flex:0 0 auto; }
  .namerow label.tog { margin-left:auto; font-size:12px; display:flex; align-items:center; gap:6px; }

  .pal-grid { max-width:1180px; margin:0 auto; display:flex; gap:24px; flex-wrap:wrap; }
  .pal-col { flex:1 1 330px; min-width:300px; }
  .pal-col .pal-title { font-family:var(--headline); font-weight:800; font-size:13px; text-transform:uppercase; letter-spacing:.04em; margin:0 0 8px; }
  .pal-card { background:var(--bg); border:var(--bw-strong) solid var(--border); box-shadow:var(--shadow-md); padding:16px; min-height:280px; }
  .pal-card::before { content: var(--pal-name); display:block; font-family:var(--mono); font-size:10.5px; color:var(--muted); margin-bottom:14px; }
  .pal-steplist { display:flex; flex-direction:column; gap:12px; }
  .pal-step { background:var(--card); border:var(--bw) solid var(--border); box-shadow:var(--shadow); padding:10px 12px; }
  .pal-step .t { font-family:var(--headline); font-weight:700; font-size:14px; color:var(--text); margin-bottom:7px; line-height:1.2; }

  /* ===== BEHAVIOR VIEW ===== */
  .layout { max-width:1180px; margin:0 auto; display:flex; gap:28px; align-items:flex-start; flex-wrap:wrap; }
  .phone { width:372px; background:var(--bg); border:2.5px solid var(--border); box-shadow:4px 4px 0 rgba(10,10,10,.8); border-radius:26px; overflow:hidden; flex:0 0 auto; }
  .pal-autism .phone, .pal-hc .phone { box-shadow:none; }
  .ph-bar { display:flex; align-items:center; gap:10px; padding:13px 15px; border-bottom:2.5px solid var(--border); background:var(--card); }
  .ph-bar .title { font-family:var(--headline); font-weight:800; font-size:16px; color:var(--text); flex:1; }
  .ph-bar .wk { font-family:var(--mono); font-size:10.5px; color:var(--muted); border:1.5px solid var(--border); padding:1px 7px; border-radius:999px; }
  .ph-body { padding:14px; display:flex; flex-direction:column; gap:13px; }

  .nextcard { background:var(--card); border:var(--bw-strong) solid var(--border); box-shadow:var(--shadow-md); border-radius:6px; padding:13px 14px; }
  .nextcard .lbl { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.1em; color:var(--muted); margin-bottom:5px; }
  .nextcard .next { font-family:var(--headline); font-weight:900; font-size:20px; color:var(--text); line-height:1.2; }
  .nextcard .none { font-family:var(--headline); font-weight:700; font-size:15px; color:var(--muted); line-height:1.3; }
  .nextcard .sub { font-size:11.5px; color:var(--muted); margin-top:6px; }

  .steplist { display:flex; flex-direction:column; gap:9px; }
  .srow { background:var(--card); border:var(--bw) solid var(--border); box-shadow:var(--shadow); border-radius:5px; padding:9px 11px; }
  .srow.cur { outline:3px solid var(--c-progress-bg); outline-offset:-1px; }
  .srow .head { display:flex; align-items:center; gap:9px; }
  .srow .num { font-family:var(--mono); font-size:11px; color:var(--muted); flex:0 0 auto; }
  .srow .t { flex:1; font-size:14px; font-weight:600; color:var(--text); line-height:1.25; }
  .pillbtn { cursor:pointer; }
  .pillbtn::after { content:'▾'; font-size:9px; margin-left:2px; opacity:.55; }
  .pillbtn:active { transform:translate(1px,1px); }
  .statemenu { margin-top:9px; padding-top:9px; border-top:1.5px dashed var(--border-subtle); }
  .statemenu .mlabel { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); margin-bottom:7px; }
  .statemenu .opts { display:flex; flex-wrap:wrap; gap:7px; }
  /* the revealed options: the original verb buttons, tinted with each target state's colour */
  .vbtn { font-family:var(--body); font-size:11.5px; font-weight:700; cursor:pointer; border:var(--bw) solid var(--border); border-radius:5px; padding:6px 11px; box-shadow:var(--shadow); display:inline-flex; align-items:center; gap:6px; }
  .vbtn:active { transform:translate(1px,1px); box-shadow:none; }

  .side { flex:1 1 360px; min-width:330px; display:flex; flex-direction:column; gap:16px; }
  .panel { background:#fff; border:2px solid #0a0a0a; box-shadow:2px 2px 0 rgba(0,0,0,.8); padding:12px 14px; }
  .panel h3 { font-family:var(--headline); font-size:14px; margin:0 0 8px; text-transform:uppercase; letter-spacing:.04em; }
  .panel p { margin:0 0 6px; font-size:12.5px; line-height:1.5; color:#333; }
  .panel .dim { color:#777; font-weight:400; text-transform:none; font-size:11px; }
  .mlist { list-style:none; margin:0; padding:0; }
  .mlist li { display:flex; gap:8px; align-items:baseline; font-size:12.5px; padding:4px 0; border-bottom:1px solid #e6e6e6; }
  .mlist li:last-child { border-bottom:none; }
  .mlist .mk { font-family:var(--mono); width:16px; flex:0 0 auto; }
  .mlist li.done { color:#059669; font-weight:600; }
  .statebox { font-family:var(--mono); font-size:11px; line-height:1.55; white-space:pre-wrap; background:#f0f0f0; border:1.5px solid #0a0a0a; padding:8px 10px; }

  /* ===== FOCUS VIEW (mirrors FocusModeScreen: MiniTimeline + CardCarousel + ProgressDots) ===== */
  /* MiniTimeline strip — small nodes + segments. Node colour = the step's state
     swatch (the SAME colour the pill uses). This is the colour-only carrier test:
     a paused node has no word beside it. */
  .minitl { display:flex; align-items:center; padding:4px 2px 2px; }
  .minitl .mn { width:14px; height:14px; border-radius:50%; border:2px solid var(--border); flex:0 0 auto; }
  .minitl .mn.cur { width:19px; height:19px; border-width:3px; }
  .minitl .mseg { flex:1 1 auto; height:2px; background:var(--border-subtle); min-width:8px; }

  /* The carousel card (one step) — mirrors StepCard. */
  .fcard { background:var(--card); border:var(--bw-strong) solid var(--border); box-shadow:var(--shadow-md); border-radius:8px; padding:16px 15px 18px; min-height:138px; display:flex; flex-direction:column; gap:11px; }
  .fcard.curring { outline:3px solid var(--c-progress-bg); outline-offset:2px; }
  .fcard .t { font-family:var(--headline); font-weight:800; font-size:19px; line-height:1.2; color:var(--text); }
  .fcard .ev { margin-top:auto; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; color:var(--c-paused-text); background:var(--c-paused-bg); border:var(--bw) solid var(--border); border-radius:999px; padding:2px 9px; align-self:flex-start; }
  .fcarousel { display:flex; align-items:center; gap:9px; }
  .fcarousel .nav { font-family:var(--body); font-size:18px; font-weight:800; cursor:pointer; background:var(--card); color:var(--text); border:var(--bw) solid var(--border); box-shadow:var(--shadow); border-radius:6px; width:34px; height:60px; flex:0 0 auto; }
  .fcarousel .nav:disabled { opacity:.3; cursor:default; box-shadow:none; }
  .fcarousel .nav:active:not(:disabled) { transform:translate(1px,1px); box-shadow:none; }
  .fcarousel .slot { flex:1 1 auto; min-width:0; }
  /* ProgressDots — one dot per step, coloured by its state swatch, current scaled.
     Like MiniTimeline, the dot carries the state with colour alone. */
  .pdots { display:flex; gap:10px; justify-content:center; padding:13px 0 2px; }
  .pdots .pd { width:12px; height:12px; border-radius:50%; border:2px solid var(--border); flex:0 0 auto; }
  .pdots .pd.cur { transform:scale(1.4); }
  .pdots .pd.goal { border-color:var(--c-progress-text); }

  /* ===== TIMELINE VIEW (mirrors TimelineJourneyScreen: ProgressBar + vertical nodes) ===== */
  .pbar-wrap { padding:2px 0 4px; }
  .pbar { height:11px; background:var(--bg2); border:var(--bw) solid var(--border); border-radius:999px; overflow:hidden; }
  .pbar .fill { height:100%; background:var(--c-progress-bg); transition:width .25s ease; }
  .pbar-label { font-size:11.5px; color:var(--muted); margin-top:6px; font-weight:600; }
  .tlist { display:flex; flex-direction:column; }
  .tlrow { display:flex; gap:13px; align-items:stretch; }
  .tlrail { display:flex; flex-direction:column; align-items:center; flex:0 0 auto; width:32px; }
  /* Big node — mirrors TimelineNode, but coloured with the STATE swatch (the pill's
     colour language), NOT the old hard-wired palette.blue600. Same state = same colour
     everywhere it appears (pill, dot, mini node, this node). */
  .tlnode { width:32px; height:32px; border-radius:50%; border:var(--bw-strong) solid var(--border); display:flex; align-items:center; justify-content:center; font-family:var(--mono); font-weight:700; font-size:13px; flex:0 0 auto; }
  .tlnode.ip { border-width:4px; }
  .tlnode.goal { width:40px; height:40px; font-size:18px; background:var(--c-progress-bg); color:var(--c-progress-text); }
  .tlconn { flex:1 1 auto; width:2px; background:var(--border-subtle); margin:3px 0; min-height:14px; }
  .tlbody { flex:1 1 auto; min-width:0; padding-bottom:18px; }
  .tlcard { background:var(--card); border:var(--bw) solid var(--border); box-shadow:var(--shadow); border-radius:5px; padding:10px 12px; display:flex; flex-direction:column; gap:8px; }
  .tlcard .t { font-family:var(--headline); font-weight:700; font-size:15px; line-height:1.25; color:var(--text); }
  .tlcard.goal .t { font-size:16px; }

  .switcher { position:fixed; bottom:16px; left:50%; transform:translateX(-50%); background:#0a0a0a; color:#fff; border-radius:999px; display:flex; align-items:center; gap:4px; padding:7px 9px; box-shadow:0 4px 14px rgba(0,0,0,.35); z-index:50; user-select:none; font-size:12px; }
  .switcher button { font-family:var(--body); font-size:12px; font-weight:600; cursor:pointer; background:transparent; color:#bbb; border:none; padding:5px 11px; border-radius:999px; }
  .switcher button.on { background:#ffe50c; color:#0a0a0a; }
</style>
</head>
<body>

<div class="page-header">
  <span class="proto-tag">Prototype — throwaway · Phase B Stage 1 · E: Step states</span>
  <h1 id="title"></h1>
  <p id="lede"></p>
</div>

<div class="controls" id="controls"></div>

<div id="root"></div>

<div class="switcher">
  <span style="color:#888;font-size:10.5px;text-transform:uppercase;letter-spacing:.08em;padding:0 6px">View</span>
  <button data-view="palette">Palette &amp; naming</button>
  <button data-view="behavior">Behavior</button>
  <button data-view="focus">Focus</button>
  <button data-view="timeline">Timeline</button>
</div>

<script>
/* ===================== state ===================== */
const PALETTES = [
  { key:'default', cls:'pal-default', label:'light-default' },
  { key:'hc',      cls:'pal-hc',      label:'highContrast' },
  { key:'autism',  cls:'pal-autism', label:'autismFriendly' },
];

/* State set (feature shape §E). `swatch` maps to a .s-* pill class.
   `bookkeeping:true` marks the one app-maintained state (the in-progress
   pointer) — allowed automation, never a verdict. */
const STATES = [
  { key:'pending',     base:'pending',     swatch:'pending'  },
  { key:'in-progress', base:'in progress', swatch:'progress', bookkeeping:true },
  { key:'paused',      base:'paused',      swatch:'paused'   },
  { key:'completed',   base:'completed',   swatch:'done'     },
];
const SWATCH_VAR = { pending:'--c-pending-bg', progress:'--c-progress-bg', paused:'--c-paused-bg', done:'--c-done-bg' };
const SWATCH_FG  = { pending:'--c-pending-text', progress:'--c-progress-text', paused:'--c-paused-text', done:'--c-done-text' };
const VERB_ICON  = { 'in-progress':'▶', 'paused':'⏸', 'completed':'✓', 'pending':'↺' };
/* Glyph shown INSIDE a big timeline node — completed/paused get a mark,
   pending/in-progress show the step number (set per-row at render). */
const NODE_GLYPH = { 'completed':'✓', 'paused':'⏸' };

let app = {
  view: 'palette',
  palette: 'default',          // behavior-view palette
  names: {},                   // key -> custom word (rename)
  menuFor: null,               // step id whose state menu is open (one at a time)
  cardIndex: 0,                // focus view: which card is centred (in-progress is NOT stored here — it's index===cardIndex, mirroring FocusModeScreen)
  focusSnapped: false,         // milestone: did entering focus snap to the first pending step?
  steps: [
    { id:1, title:'Plan layout & buy materials', status:'in-progress' },
    { id:2, title:'Wire the lighting circuit',   status:'pending' },
    { id:3, title:'Wire the appliance circuit',  status:'pending' },
    { id:4, title:'Inspection & labels',         status:'pending' },
  ],
  log: [],                     // human-readable action trail for the state box
};

/* ===================== BEHAVIOR VIEW ===================== */
/* The "one next step" the task view promises: the in-progress step if one
   exists, else the first pending step (routing PAST paused / completed). */
function readout() {
  const ip = app.steps.find(s => s.status === 'in-progress');
  if (ip) return { kind:'current', step:ip };
  const pend = app.steps.find(s => s.status === 'pending');
  if (pend) return { kind:'next', step:pend };
  const pausedCount = app.steps.filter(s => s.status === 'paused').length;
  if (pausedCount) return { kind:'parked', pausedCount };
  return { kind:'done' };
}

/* Auto-advance the in-progress POINTER to the next pending step (skipping
   paused / completed). Bookkeeping only — asserts nothing about the user. */
function advancePointer() {
  const next = app.steps.find(s => s.status === 'pending');
  if (next) { next.status = 'in-progress'; app.log.push(`→ "${next.title}" auto-became in progress`); }
}

function setStatus(id, status) {
  const step = app.steps.find(s => s.id === id);
  if (!step || step.status === status) return;
  const wasInProgress = step.status === 'in-progress';

  if (status === 'in-progress') {
    // moving the pointer by hand: the step that HAD it falls back to pending
    const prev = app.steps.find(s => s.status === 'in-progress');
    if (prev && prev.id !== id) { prev.status = 'pending'; }
    step.status = 'in-progress';
    app.log.push(`set "${step.title}" in progress by hand`);
    return;
  }

  step.status = status;
  app.log.push(`set "${step.title}" → ${wordFor(status)} (by hand)`);
  // pausing / completing / missing the current step hands the pointer onward
  if (wasInProgress) advancePointer();
}

function resetFlow() {
  app.log = []; app.menuFor = null;
  app.steps = [
    { id:1, title:'Plan layout & buy materials', status:'in-progress' },
    { id:2, title:'Wire the lighting circuit',   status:'pending' },
    { id:3, title:'Wire the appliance circuit',  status:'pending' },
    { id:4, title:'Inspection & labels',         status:'pending' },
  ];
}

const MILESTONES = [
  { label:'1 · A step is in progress (the app-maintained pointer)', test:() => app.steps.some(s => s.status==='in-progress') },
  { label:'2 · Pause the in-progress step → the next pending step auto-becomes in progress (Q6)', test:() => app.log.some(l => l.includes('auto-became')) },
  { label:'3 · The “one next step” readout routes PAST a paused step (Q5)', test:() => app.steps.some((s,i)=> s.status==='paused' && app.steps.slice(i+1).some(x=>x.status==='pending'||x.status==='in-progress')) },
  { label:'4 · Pause a step by hand — confirm nothing automatic set it (no-auto-judgment)', test:() => app.steps.some(s => s.status==='paused') },
  { label:'5 · Pause / skip every remaining step → what does “one next step” show? (Q5 tail)', test:() => readout().kind === 'parked' },
  { label:'6 · Rename a state and watch the word ride beside its colour (Q4)', test:() => Object.values(app.names).some(Boolean) },
];

function renderBehaviorView() {
  const pal = PALETTES.find(p => p.key === app.palette);
  const r = readout();
  let nextHtml;
  if (r.kind === 'current') nextHtml = `<div class="next">${esc(r.step.title)}</div><div class="sub">in progress · the step you're on</div>`;
  else if (r.kind === 'next') nextHtml = `<div class="next">${esc(r.step.title)}</div><div class="sub">next pending step</div>`;
  else if (r.kind === 'parked') nextHtml = `<div class="none">No step is in progress.<br>${r.pausedCount} paused — all still here, none hidden.</div><div class="sub">absence is left uninterpreted — no score, no nudge, no count on anything</div>`;
  else nextHtml = `<div class="none">Every step is done.</div><div class="sub">marking the goal complete stays the user's call</div>`;

  const stepRows = app.steps.map((s, i) => {
    const cur = s.status === 'in-progress';
    const open = app.menuFor === s.id;
    // the pill IS the control — tap to reveal the state options, tap again to close
    const pillBtn = `<span class="pill ${swatchClass(s.status)} pillbtn" data-menu="${s.id}"><span class="dot" style="background:var(${SWATCH_VAR[STATES.find(x=>x.key===s.status).swatch]})"></span>${esc(wordFor(s.status))}</span>`;
    const opts = activeStates().filter(st => st.key !== s.status).map(st =>
      `<button class="vbtn" data-set="${s.id}:${st.key}" style="background:var(${SWATCH_VAR[st.swatch]});color:var(${SWATCH_FG[st.swatch]})">${VERB_ICON[st.key]}&nbsp;${esc(wordFor(st.key))}</button>`
    ).join('');
    const menu = open ? `

        <div class="opts">${opts}</div>
      </div>` : '';
    return `
      <div class="srow ${cur?'cur':''}">
        <div class="head"><span class="num">${i+1}</span><span class="t">${esc(s.title)}</span>${pillBtn}</div>
        ${menu}
      </div>`;
  }).join('');

  const phone = `
    <div class="phone ${pal.cls}">
      <div class="ph-bar"><span class="title">Build practice panel</span></div>
      <div class="ph-body">
        <div class="nextcard"><div class="lbl">One next step</div>${nextHtml}</div>
        <div class="steplist">${stepRows}</div>

  const milestones = MILESTONES.map(m => `<li class="${m.test()?'done':''}"><span class="mk">${m.test()?'✓':'·'}</span>${m.label}</li>`).join('');

  const stateLines = [
    `palette: ${pal.label}`,
    ...app.steps.map((s,i) => `  ${i+1}. [${s.status}] ${s.title}`),
    `next → ${(() => { const r2 = readout(); return r2.kind==='current'||r2.kind==='next' ? `"${r2.step.title}"` : r2.kind==='parked' ? '(none — steps parked, not hidden)' : '(none — all done)'; })()}`,
    ...(app.log.length ? ['', '— trail —', ...app.log.slice(-7)] : []),
  ].join('\n');

  const renameStrip = STATES.map(s =>
    `<div class="namerow"><span class="key">${s.key}</span><input type="text" data-rename="${s.key}" value="${esc(app.names[s.key]||'')}" placeholder="“${s.base}”"></div>`
  ).join('');

  return `
    <div class="layout">
      ${phone}
      <div class="side">
        <div class="panel">
          <h3>Session script <span class="dim">— milestones auto-check as you exercise the questions</span></h3>
          <ul class="mlist">${milestones}</ul>

          <p>The only automation is the <b>in-progress pointer</b> advancing when you pause/complete the current step — bookkeeping the user would otherwise do by hand, asserting nothing about them. Every other state — <b>paused</b>, <b>completed</b> — is set only by the user's tap, never by the app. A paused step stays visible in the list; nothing is hidden, scored, counted, or aggregated.</p>
        </div>

}

/* ===================== FOCUS VIEW (FocusModeScreen) ===================== */
/* Mirrors FocusModeScreen: MiniTimeline strip + swipeable CardCarousel + ProgressDots.
   Critically: in-progress is NOT stored here — the "current" card is index===cardIndex
   (snap-to-first-pending on entry). So a step's STORED state (paused/completed)
   and the carousel's notion of "where you are" are two independent signals: you can be
   parked ON a paused card — pill says paused, the ring says current. That collision is
   the thing the flat behavior view could never show. */
function firstPendingIndex() {
  const i = app.steps.findIndex(s => s.status === 'pending' || s.status === 'in-progress');
  return i < 0 ? 0 : i;
}
function snapFocus() {
  app.cardIndex = firstPendingIndex();
  app.focusSnapped = app.cardIndex > 0;   // snapped PAST something (matches findFirstPendingIndex>0 guard)
}
function clampCard(n) { return Math.max(0, Math.min(app.steps.length - 1, n)); }

function renderFocusView() {
  const pal = PALETTES.find(p => p.key === app.palette);
  const cur = app.steps[app.cardIndex];

  // MiniTimeline — node colour = the step's state swatch (colour-only carrier)
  const miniNodes = app.steps.map((s, i) => {
    const isCur = i === app.cardIndex;

    return `<div class="mn ${isCur?'cur':''}" style="background:var(${SWATCH_VAR[STATES.find(x=>x.key===s.status).swatch]})" title="${esc(wordFor(s.status))}"></div>${seg}`;
  }).join('');

  // The centred card + prev/next
  const evCount = ({1:2, 2:0, 3:1, 4:0})[cur.id] || 0;   // fixed sample evidence counts, no behaviour
  const card = `
    <div class="fcard curring">
      <div style="display:flex;align-items:center;justify-content:space-between;gap:10px">
        <span class="num" style="font-family:var(--mono);font-size:12px;color:var(--muted)">Step ${app.cardIndex+1} of ${app.steps.length}</span>
        ${(() => { const s=cur; return `<span class="pill ${swatchClass(s.status)} pillbtn" data-menu="${s.id}"><span class="dot" style="background:var(${SWATCH_VAR[STATES.find(x=>x.key===s.status).swatch]})"></span>${esc(wordFor(s.status))}</span>`; })()}
      </div>
      <div class="t">${esc(cur.title)}</div>
      ${evCount ? `<span class="ev">${evCount} piece${evCount>1?'s':''} of evidence</span>` : ''}
      ${app.menuFor === cur.id ? `<div class="statemenu"><div class="mlabel">Set this step to…</div><div class="opts">${
        activeStates().filter(st => st.key !== cur.status).map(st =>
          `<button class="vbtn" data-set="${cur.id}:${st.key}" style="background:var(${SWATCH_VAR[st.swatch]});color:var(${SWATCH_FG[st.swatch]})">${VERB_ICON[st.key]}&nbsp;${esc(wordFor(st.key))}</button>`).join('')
      }</div></div>` : ''}
    </div>`;

  // ProgressDots — colour by state swatch, scale the current
  const dots = app.steps.map((s, i) =>
    `<div class="pd ${i===app.cardIndex?'cur':''}" style="background:var(${SWATCH_VAR[STATES.find(x=>x.key===s.status).swatch]})" title="${esc(wordFor(s.status))}"></div>`
  ).join('');

  const phone = `
    <div class="phone ${pal.cls}">
      <div class="ph-bar"><span class="title">Build practice panel</span></div>
      <div class="ph-body">
        <div class="minitl">${miniNodes}</div>

          <button class="nav" data-card="prev" ${app.cardIndex===0?'disabled':''}>‹</button>
          <div class="slot">${card}</div>
          <button class="nav" data-card="next" ${app.cardIndex===app.steps.length-1?'disabled':''}>›</button>
        </div>
        <div class="pdots">${dots}</div>
      </div>
    </div>`;

  const parkedOnPaused = cur.status === 'paused';
  const milestones = [
    { label:'1 · On entry the carousel snaps to the first unfinished step (not always step 1) — findFirstPendingIndex', done: app.focusSnapped },
    { label:'2 · A paused step shows in the dots & mini-timeline with COLOUR ONLY — no word beside it (sole-carrier test)', done: app.steps.some(s => s.status==='paused') },
    { label:'3 · Pause the current step, then ›: the carousel moves past it (paused isn\'t "pending")', done: app.steps.some(s => s.status==='paused') && app.cardIndex>0 },
    { label:'4 · Park ON a paused card: the pill says paused, the ring/dot says "current" — the collision', done: parkedOnPaused },
    { label:'5 · Rename a state — the word rides beside its colour on the card pill (Q4)', done: Object.values(app.names).some(Boolean) },
  ].map(m => `<li class="${m.done?'done':''}"><span class="mk">${m.done?'✓':'·'}</span>${m.label}</li>`).join('');

  return `
    <div class="finding">
      <b>Focus view — the colour-only carrier test.</b> The pill always carried a <i>word beside</i> the colour; a
      <code>ProgressDot</code> and a <code>MiniTimeline</code> node do not. Here <b>paused</b> is
      shown by colour alone — the stress on the "colour is never the sole carrier" guardrail. Also: in Focus the

        </div>
      </div>
    </div>`;
}

/* ===================== TIMELINE VIEW (TimelineJourneyScreen) ===================== */
/* Mirrors TimelineJourneyScreen: a ProgressBar + "X of Y complete" header over a vertical
   run of big nodes. Per the design call, node colours use the STATE swatch (the pill's
   colour language) — NOT the old hard-wired palette.blue600 — so a state is the same
   colour wherever it appears. The progress bar's denominator is every step; what "X of Y"
   reads like once a step is paused is the thing to look at. */
function renderTimelineView() {
  const pal = PALETTES.find(p => p.key === app.palette);
  const total = app.steps.length;
  const completed = app.steps.filter(s => s.status === 'completed').length;
  const pct = total ? Math.round((completed / total) * 100) : 0;
  const pausedN = app.steps.filter(s => s.status === 'paused').length;

  const rows = app.steps.map((s, i) => {
    const sw = STATES.find(x => x.key === s.status).swatch;
    const glyph = NODE_GLYPH[s.status] || String(i + 1);

    const pillBtn = `<span class="pill ${swatchClass(s.status)} pillbtn" data-menu="${s.id}"><span class="dot" style="background:var(${SWATCH_VAR[sw]})"></span>${esc(wordFor(s.status))}</span>`;
    const menu = app.menuFor === s.id ? `<div class="statemenu"><div class="mlabel">Set this step to…</div><div class="opts">${

        `<button class="vbtn" data-set="${s.id}:${st.key}" style="background:var(${SWATCH_VAR[st.swatch]});color:var(${SWATCH_FG[st.swatch]})">${VERB_ICON[st.key]}&nbsp;${esc(wordFor(st.key))}</button>`).join('')
    }</div></div>` : '';
    return `
      <div class="tlrow">
        <div class="tlrail">${node}<div class="tlconn"></div></div>
        <div class="tlbody"><div class="tlcard"><div style="display:flex;align-items:center;justify-content:space-between;gap:9px"><span class="t">${esc(s.title)}</span>${pillBtn}</div>${menu}</div></div>
      </div>`;
  }).join('');

  const goalRow = `
    <div class="tlrow">
      <div class="tlrail"><div class="tlnode goal">★</div></div>
      <div class="tlbody"><div class="tlcard goal"><span class="t">Practice panel built</span></div></div>
    </div>`;

  const phone = `
    <div class="phone ${pal.cls}">
      <div class="ph-bar"><span class="title">Build practice panel</span></div>
      <div class="ph-body">
        <div class="pbar-wrap">
          <div class="pbar"><div class="fill" style="width:${pct}%"></div></div>

        </div>

    </div>`;

  const milestones = [
    { label:'1 · The big nodes use the STATE colour (pill language), not blue600 — a state is one colour everywhere', done:true },
    { label:'2 · paused (⏸) renders as a node, not "fall through to pending"', done: app.steps.some(s=>s.status==='paused') },
    { label:'3 · Pause a step — does "X of Y complete" / the bar read as a verdict on the paused one? (look, don\'t assert)', done: pausedN>0 },
    { label:'4 · All four states present at once — legible as a vertical run?', done: new Set(app.steps.map(s=>s.status)).size >= 4 },
  ].map(m => `<li class="${m.done?'done':''}"><span class="mk">${m.done?'✓':'·'}</span>${m.label}</li>`).join('');

  return `
    <div class="finding">
      <b>Timeline view — one colour language.</b> The real <code>TimelineNode</code> is hard-wired to
      <code>palette.blue600</code>, a different colour language than the <code>StatusBadge</code> pill — so timeline
      and card surfaces don\'t even agree on <i>completed</i> today. Here the nodes carry the <b>state swatch</b>
      instead, so a state is the same colour in the pill, the dot, and the node. The open question that stays:
      the <b>progress bar</b> counts <code>completed / total</code> — watch what "X of Y complete" reads like once a
      step is <b>paused</b>.
    </div>
    <div class="layout">

  behavior: 'Tomás\'s practice panel. Tap a step\'s pill to set its state, and watch the <strong>in-progress pointer auto-advance</strong> when you pause/complete and the <strong>“one next step” readout route past a paused step</strong>. The side panels instrument the prototype questions; the no-auto-judgment guardrail here is that <strong>paused is only ever set by hand</strong>.',
  focus:    'The same steps in <strong>Focus mode</strong> — a swipeable card carousel with a mini-timeline strip and progress dots. Here the dots and mini-timeline nodes carry a state by <strong>colour alone</strong> (the sole-carrier test), and the centred card is the <strong>current</strong> step (not stored) — so it can disagree with a paused pill.',
  timeline: 'The same steps in the <strong>Timeline journey</strong> — a vertical run of nodes under a progress bar. The big nodes use the <strong>state colour language</strong> (the pill\'s), not the old hard-wired <code>blue600</code>, so a state is one colour everywhere. Watch what <strong>“X of Y complete”</strong> reads like once a step is paused.',
};

function render() {
  document.getElementById('title').textContent = TITLES[app.view];
  document.getElementById('lede').innerHTML = LEDES[app.view];
  document.getElementById('controls').innerHTML = renderControls();
  const root = document.getElementById('root');
  if (app.view === 'palette') root.innerHTML = renderPaletteView();
  else if (app.view === 'behavior') root.innerHTML = renderBehaviorView();
  else if (app.view === 'focus') root.innerHTML = renderFocusView();
  else root.innerHTML = renderTimelineView();
  document.querySelectorAll('.switcher button').forEach(b => b.classList.toggle('on', b.dataset.view === app.view));
}

/* events (delegated) */
document.body.addEventListener('click', e => {
  const v = e.target.closest('[data-view]'); if (v) { app.view = v.dataset.view; app.menuFor = null; if (app.view === 'focus') snapFocus(); render(); return; }
  const p = e.target.closest('[data-pal]'); if (p) { app.palette = p.dataset.pal; render(); return; }
  const cd = e.target.closest('[data-card]'); if (cd) { app.cardIndex = clampCard(app.cardIndex + (cd.dataset.card==='next'?1:-1)); app.menuFor = null; render(); return; }
  const st = e.target.closest('[data-set]'); if (st) { const [id, status] = st.dataset.set.split(':'); setStatus(Number(id), status); app.menuFor = null; render(); return; }
  const mn = e.target.closest('[data-menu]'); if (mn) { const id = Number(mn.dataset.menu); app.menuFor = app.menuFor === id ? null : id; render(); return; }
  if (e.target.closest('[data-reset]')) { resetFlow(); render(); return; }
  if (app.menuFor !== null) { app.menuFor = null; render(); }  // click anywhere else closes the menu
});
document.body.addEventListener('input', e => {
  if (e.target.matches('[data-rename]')) {
    const k = e.target.dataset.rename; app.names[k] = e.target.value.trim();
    // re-render only pills/labels would be ideal; full re-render is fine and keeps focus loss bounded to the gallery
    if (app.view === 'behavior') { render(); restoreFocus(e.target); }
    else { render(); restoreFocus(e.target); }
  }
});
function restoreFocus(prev) {
  const sel = `[data-rename="${prev.dataset.rename}"]`;
  const el = document.querySelector(sel);
  if (el) { el.focus(); const v = el.value; el.value=''; el.value=v; }
}

/* keyboard. behavior/timeline: ← / → cycle palettes. focus: ← / → move card,
   ↑ / ↓ cycle palettes (so arrows can drive the carousel). */
function cyclePalette(dir) {
  const i = PALETTES.findIndex(p => p.key === app.palette);
  app.palette = PALETTES[(i + (dir>0?1:PALETTES.length-1)) % PALETTES.length].key;
  render();
}
document.addEventListener('keydown', e => {
  if (app.view === 'palette') return;
  if (document.activeElement && document.activeElement.matches('input')) return;
  if (app.view === 'focus') {
    if (e.key === 'ArrowLeft')  { app.cardIndex = clampCard(app.cardIndex - 1); app.menuFor = null; render(); }
    else if (e.key === 'ArrowRight') { app.cardIndex = clampCard(app.cardIndex + 1); app.menuFor = null; render(); }
    else if (e.key === 'ArrowUp')   cyclePalette(-1);
    else if (e.key === 'ArrowDown') cyclePalette(1);
    return;
  }
  if (e.key === 'ArrowLeft')  cyclePalette(-1);
  else if (e.key === 'ArrowRight') cyclePalette(1);
});

/* honor ?view= / ?palette= */
const qs = new URLSearchParams(location.search);
if (['palette','behavior','focus','timeline'].includes(qs.get('view'))) app.view = qs.get('view');
if (PALETTES.some(p => p.key === qs.get('palette'))) app.palette = qs.get('palette');
if (app.view === 'focus') snapFocus();
render();
</script>
</body>
</html>
