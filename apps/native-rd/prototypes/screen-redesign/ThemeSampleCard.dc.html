<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="display:flex; align-items:center; gap:12px; background:{{ t.surface }}; border:{{ t.cardBorder }}; border-radius:{{ t.radius }}; box-shadow:{{ t.cardShadow }}; padding:12px 13px; font-family:{{ t.bodyFont }};">
  <div style="width:34px; height:34px; flex:none; border-radius:50%; background:{{ t.accent }}; border:{{ t.cardBorder }}; display:flex; align-items:center; justify-content:center; color:{{ t.accentFg }}; font-size:15px;">★</div>
  <div style="flex:1; min-width:0;">
    <div style="font-family:{{ t.headFont }}; font-weight:{{ t.headW }}; font-size:calc(14px * {{ t.fs }}); color:{{ t.ink }}; line-height:1.12;">Daily reading</div>
    <div style="font-family:{{ t.monoFont }}; font-size:calc(10px * {{ t.fs }}); color:{{ t.inkSoft }}; margin-top:3px; letter-spacing:0.02em;">3 of 5 done</div>
  </div>
  <div style="flex:none; padding:6px 10px; border-radius:{{ t.radius }}; background:{{ t.primary }}; color:{{ t.primaryFg }}; border:{{ t.cardBorder }}; font-family:{{ t.monoFont }}; font-size:calc(9.5px * {{ t.fs }}); font-weight:700; letter-spacing:0.04em; white-space:nowrap;">+ ADD</div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:300,&quot;height&quot;:74},&quot;t&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;Record&lt;string,string&gt;&quot;}}"></script>
</body>
</html>
