# badges — ND adult, badge collection view + earned-celebration modal.
# Covers BadgesScreen (list/empty chrome) and BadgeEarnedModal (microcopy,
# a11y labels, CTA buttons).

speaker: app
audience: ND adult
formality: informal
banned_phrasings:
  - Glückwunsch!
  - Großartig!
  - du hast es geschafft!
  - dein Erfolg
  - Achievement
  - sammle sie alle
  - besonders
  - einzigartig
  - leidet an
notes:
  - Badges are self-validation, not external approval — no achievement-porn.
  - 'Matter-of-fact brevity. "verliehen." beats "Du hast erfolgreich einen Badge erhalten!".'
  - The noun "badge" stays as the English loanword "Badge" / "Badges" to match
    de/common.json and de/badgeDetail.json. Do not translate to "Abzeichen".
  - The noun "goal" is translated as "Ziel" / "Ziele" in German to match the
    nav tab label (de/common.json navigation.tabs.goals = "Ziele") and
    de/goals.json. Do not keep "Goals" as an English loanword.
  - The `earned.*` keys cover the celebration modal shown right after a badge
    is minted. a11y labels (`earned.a11y.*`) are factual descriptions for
    screen readers; microcopy (`earned.microcopy.*`) is the on-screen line
    under the badge image; CTAs (`earned.actions.*`) are the two buttons.
  - The `card.untitledFallback` key is chrome shown when a badge's goalTitle
    is null — not user-generated content. It mirrors
    `badgeDetail.fallback.untitled`.
  - 'First-badge microcopy stays small. "Das erste. (notiert.)" beats
    "Dein allererstes Badge — herzlichen Glückwunsch!".'
