notes:
  - Badges are self-validation, not external approval â€” no achievement-porn.
  - 'Matter-of-fact brevity. "verliehen." beats "Du hast erfolgreich einen Badge erhalten!".'
  - The noun "badge" stays as the English loanword "Badge" / "Badges" to match
    de/common.json and de/badgeDetail.json. Do not translate to "Abzeichen".
  - The noun "goal" is translated as "Ziel" / "Ziele" in German to match the
    nav tab label (de/common.json navigation.tabs.goals = "Ziele") and
    de/goals.json. Do not keep "Goals" as an English loanword.
  - The `earned.*` keys cover the celebration modal shown right after a badge
    is minted. a11y labels (`earned.a11y.*`) are factual descriptions for
    screen readers; microcopy (`earned.microcopy.*`) is the on-screen line
    under the badge image; CTAs (`earned.actions.*`) are the two buttons.
  - The `card.untitledFallback` key is chrome shown when a badge's goalTitle
    is null â€” not user-generated content. It mirrors
    `badgeDetail.fallback.untitled`.
  - 'First-badge microcopy stays small. "Das erste. (notiert.)" beats
    "Dein allererstes Badge â€” herzlichen GlĂĽckwunsch!".'
  - The `credential.*` keys are the OB3 achievement criteria narrative baked
    into the signed badge at creation time and shown on BadgeDetail under
    "How it was earned". `{{title}}` is the user's goal title â€” do NOT
    translate it, it interpolates verbatim. Use "Schritt"/"Schritte" for
    steps (matches completion.json) and "Nachweis"/"Nachweise" for evidence
    items (matches focusMode.json / common.json). `narrativeNoEvidence` is the
    zero-evidence sentence and omits the evidence clause entirely. Plural
    forms follow English's _one/_other.
  - >-
    The `wall.*` keys are the chrome of the BadgesWall "wall of proof" view.
    `wall.count` (`{{count}} badges`) is the header tally, matter-of-fact with
    no exclamation. `wall.allVerifiable` and `wall.justEarned` are all-caps
    overlines; keep them terse and calm. "Verifiable" means the credential is
    real and checkable, not a boast. Preserve the middot separator "Â·" verbatim.
  - >-
    The redesigned `empty.*` copy is quiet encouragement rather than a scold; it
    names what the first badge WILL be ("Your first badge is waiting"), never
    what is missing. `empty.action` embeds a trailing arrow "â†’" in the string
    (Button's icon slot is leading-only), so keep the arrow when translating.
