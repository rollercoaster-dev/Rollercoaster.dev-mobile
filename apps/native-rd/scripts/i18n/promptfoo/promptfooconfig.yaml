description: "native-rd i18n bake-off: en→de voice fidelity across 6 candidate models"

# Translation prompt is deliberately minimal — the bake-off evaluates inherent
# model voice quality, not prompt engineering. The production prompt (PR #8)
# will add register YAMLs and intent sidecars on top.
prompts:
  - |
    [
      {
        "role": "system",
        "content": "You are translating UI strings from English to German for a personal learning tracker used by neurodivergent people. Translate accurately, briefly, and in a direct, non-patronizing tone. Preserve any double-curly-brace placeholders exactly as-is — do not translate the variable name inside them. Return only the German translation: no quotes, no commentary, no explanations, no leading or trailing whitespace."
      },
      {
        "role": "user",
        "content": "{{en}}"
      }
    ]

# Six candidate models from models.ts registry. Temperature 0 across the board
# to match the registry default (single source of truth). The `openrouter:`
# provider reads OPENROUTER_API_KEY directly — same env var as llmGateway.ts.
providers:
  - id: openrouter:openai/gpt-4o-mini
    config:
      temperature: 0
  - id: openrouter:openai/gpt-4o
    config:
      temperature: 0
  - id: openrouter:anthropic/claude-haiku-4-5
    config:
      temperature: 0
  - id: openrouter:anthropic/claude-sonnet-4-6
    config:
      temperature: 0
  - id: openrouter:google/gemini-2.5-flash
    config:
      temperature: 0
  - id: openrouter:deepseek/deepseek-chat
    config:
      temperature: 0

# OPENROUTER_API_KEY is read from the shell environment by the openrouter:*
# providers. The npm script `i18n:bakeoff` shells out a precheck so unset
# fails fast with a clear message — promptfoo's own `env:` schema is a
# key→value injection map, not a required-vars validator, so any
# `required: true` style block here would be a silent no-op.
#
# Fixture corpus lives in fixtures.json. Each entry contributes one test case
# with vars { ns, key, en }. Keep arrays out of `vars`: promptfoo expands array
# vars into multiple test rows, which corrupts placeholder assertions.
tests: file://./fixtures.json

# Assertions applied to every fixture. Placeholder, banned-phrase, and length
# checks are deterministic. Voice rubric assertions live only on prose fixtures
# in fixtures.json so operational labels are not judged for brand voice.
defaultTest:
  options:
    provider:
      id: openrouter:anthropic/claude-opus-4-5
      config:
        temperature: 0
  assert:
    # 1. Placeholder preservation. Expected placeholders are derived from the
    #    source string, not fixture metadata, so promptfoo var expansion cannot
    #    turn an array into a scalar and break the check.
    - type: javascript
      value: |
        if (typeof output !== 'string') {
          return { pass: false, score: 0, reason: 'expected string output, got ' + typeof output };
        }
        const extract = (str) =>
          Array.from(String(str).matchAll(/\{\{([^}]+)\}\}/g), (m) => m[1]);
        const count = (arr) =>
          arr.reduce((map, key) => ((map[key] = (map[key] || 0) + 1), map), {});
        const expectedCounts = count(extract(context.vars.en || ''));
        const actualCounts = count(extract(output));
        const keys = new Set([...Object.keys(expectedCounts), ...Object.keys(actualCounts)]);
        const missing = [];
        const extra = [];
        for (const key of keys) {
          const expected = expectedCounts[key] || 0;
          const actual = actualCounts[key] || 0;
          if (actual < expected) missing.push(key);
          if (actual > expected) extra.push(key);
        }
        if (missing.length || extra.length) {
          const parts = [];
          if (missing.length) parts.push('missing: ' + missing.join(', '));
          if (extra.length) parts.push('extra: ' + extra.join(', '));
          return { pass: false, score: 0, reason: parts.join('; ') };
        }
        const expectedTotal = Object.values(expectedCounts).reduce((sum, n) => sum + n, 0);
        return {
          pass: true,
          score: 1,
          reason: expectedTotal === 0 ? 'no placeholders expected' : 'all placeholders preserved',
        };

    # 2. Banned-phrase absence. English anti-patterns from BRAND_LANGUAGE.md;
    #    German list is researcher-drafted and should be refined from real run
    #    failures, not expanded speculatively.
    - type: javascript
      value: |
        if (typeof output !== 'string') {
          return { pass: false, score: 0, reason: 'expected string output, got ' + typeof output };
        }
        const phrases = [
          'special needs',
          'differently abled',
          'high-functioning',
          'low-functioning',
          'suffers from',
          'oder nicht',
          'oder lass es',
        ];
        const lower = output.toLowerCase();
        const hits = phrases.filter((phrase) => lower.includes(phrase.toLowerCase()));
        return hits.length === 0
          ? { pass: true, score: 1, reason: 'no banned phrases' }
          : { pass: false, score: 0, reason: 'banned phrases: ' + hits.join(', ') };

    # 3. Length bounds. German is structurally wordier than English, so the
    #    band is intentionally wide (0.5×–2.5×) to avoid false failures on
    #    short strings while catching runaway verbosity on long ones.
    - type: javascript
      value: |
        if (typeof output !== 'string') {
          return { pass: false, score: 0, reason: 'expected string output, got ' + typeof output };
        }
        if (typeof context.vars.en !== 'string') {
          return { pass: false, score: 0, reason: 'context.vars.en missing or non-string' };
        }
        const enLen = context.vars.en.length;
        if (enLen === 0) {
          return { pass: false, score: 0, reason: 'en fixture is empty' };
        }
        const ratio = output.length / enLen;
        const pass = ratio >= 0.5 && ratio <= 2.5;
        return {
          pass,
          score: pass ? 1 : 0,
          reason: 'length ratio ' + ratio.toFixed(2) + 'x (band 0.5-2.5)',
        };
