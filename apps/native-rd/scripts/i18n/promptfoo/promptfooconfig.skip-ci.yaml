description: "native-rd i18n bake-off: en→de voice fidelity across 6 candidate models"

# Translation prompt is deliberately minimal — the bake-off evaluates inherent
# model voice quality, not prompt engineering. The production prompt (PR #8)
# will add register YAMLs and intent sidecars on top.
prompts:
  - |
    [
      {
        "role": "system",
        "content": "You are translating UI strings from English to German for a personal learning tracker used by neurodivergent people. Translate accurately, briefly, and in a direct, non-patronizing tone. Preserve any double-curly-brace placeholders exactly as-is — do not translate the variable name inside them. Return only the German translation: no quotes, no commentary, no explanations, no leading or trailing whitespace."
      },
      {
        "role": "user",
        "content": "{{en}}"
      }
    ]

providers:
  - id: openrouter:openai/gpt-4o-mini
    config:
      temperature: 0
  - id: openrouter:openai/gpt-4o
    config:
      temperature: 0
  - id: openrouter:anthropic/claude-haiku-4-5
    config:
      temperature: 0
  - id: openrouter:anthropic/claude-sonnet-4-6
    config:
      temperature: 0
  - id: openrouter:google/gemini-2.5-flash
    config:
      temperature: 0
  - id: openrouter:deepseek/deepseek-chat
    config:
      temperature: 0

# Fixture taxonomy lives in a sibling `metadata` block, not inside `vars` —
# promptfoo auto-fans arrays inside `vars` into one test per element, which
# would multiply the run count.
tests: file://./fixtures.json

defaultTest:
  options:
    provider:
      id: openrouter:anthropic/claude-opus-4-5
      config:
        temperature: 0
  assert:
    # 1. Placeholder preservation. Expected placeholders are derived from the
    #    source `en` string via regex rather than read from a fixture var —
    #    promptfoo flattens scalar vars during array expansion in ways that
    #    are hard to defend against in-cell. The regex source-of-truth also
    #    means new fixtures can't drift from their declared placeholder set.
    - type: javascript
      value: |
        if (typeof output !== 'string') {
          return { pass: false, score: 0, reason: 'expected string output, got ' + typeof output };
        }
        const source = String(context.vars.en || '');
        // Regex must stay in sync with placeholderGuard.ts:13.
        const expected = Array.from(source.matchAll(/\{\{([^}]+)\}\}/g), (m) => m[1].trim());
        const missing = expected.filter((p) => !output.includes('{{' + p + '}}'));
        if (missing.length > 0) {
          return { pass: false, score: 0, reason: 'missing placeholders: ' + missing.join(', ') };
        }
        return { pass: true, score: 1, reason: expected.length === 0 ? 'no placeholders expected' : 'all placeholders preserved' };

    # 2. Banned-phrase absence. Corpus shared with lintSource.ts via
    #    bannedPhrases.json (sourced from BRAND_LANGUAGE.md v1.2). German
    #    list is researcher-drafted — review before the first full eval run.
    - type: javascript
      value: |
        const path = require('path');
        const phrases = require(path.resolve(process.cwd(), 'scripts/i18n/bannedPhrases.json'));
        const lower = String(output).toLowerCase();
        const englishHits = phrases.english
          .filter((p) => lower.includes(p.phrase.toLowerCase()))
          .map((p) => p.phrase);
        const germanHits = phrases.german.filter((p) =>
          lower.includes(p.toLowerCase()),
        );
        const hits = [...englishHits, ...germanHits];
        return hits.length === 0
          ? { pass: true, score: 1, reason: 'no banned phrases' }
          : { pass: false, score: 0, reason: 'banned phrases: ' + hits.join(', ') };

    # 3. Length bounds. German is structurally wordier than English, so the
    #    band is intentionally wide (0.5×–2.5×) to avoid false failures on
    #    short strings while catching runaway verbosity on long ones.
    - type: javascript
      value: |
        if (typeof output !== 'string') {
          return { pass: false, score: 0, reason: 'expected string output, got ' + typeof output };
        }
        if (typeof context.vars.en !== 'string') {
          return { pass: false, score: 0, reason: 'context.vars.en missing or non-string' };
        }
        const enLen = context.vars.en.length;
        if (enLen === 0) {
          return { pass: false, score: 0, reason: 'en fixture is empty' };
        }
        const ratio = output.length / enLen;
        const pass = ratio >= 0.5 && ratio <= 2.5;
        return {
          pass,
          score: pass ? 1 : 0,
          reason: 'length ratio ' + ratio.toFixed(2) + 'x (band 0.5–2.5)',
        };
