appId: dev.rollercoaster.app
---
# Lina's Quiet Victory — create a goal, add a quick note, complete the step, add a final goal note
# Status: required
# Criteria: stable feature, outcome assertion present, deterministic
- clearState
- launchApp
# Expo SDK 55 dev-client lands on its server picker after clearState
# instead of auto-reloading the last bundle. Bypass via the dev-client
# deep-link scheme `exp+<slug>://expo-development-client/?url=<bundle-url>`.
# Onboarding hint + dev-menu modals are pre-disabled in run-e2e.sh.
- openLink: "exp+rollercoasterdev://expo-development-client/?url=http%3A%2F%2Flocalhost%3A8081"
- assertVisible: "Welcome to your ride."
- tapOn: "The Full Ride. Standard theme"
- tapOn: "Get Started"
- assertVisible: "Goals"

# Create a new goal
- tapOn:
    id: "tab-fab-new-goal"
- assertVisible: "New Goal"
- tapOn: "What do you want to learn?"
- inputText: "Reorganize Local History section"
- tapOn: "Create Goal"

# Badge designer → use default
- assertVisible: "Design Badge"
- scrollUntilVisible:
    element: "Use This Design"
    direction: DOWN
    timeout: 10000
- tapOn: "Use This Design"

# Edit mode — add a step with text evidence (pre-selected by default)
- assertVisible: "Edit Goal"
- tapOn:
    id: "step-list-new-step-input"
- inputText: "Write a quick reflection"
- pressKey: Enter
- assertVisible: "1 step"
- hideKeyboard

# Enter Focus Mode
- scrollUntilVisible:
    element: "Start Working"
    direction: DOWN
    timeout: 10000
- tapOn: "Start Working"
- assertVisible: "Focus Mode"

# Wait for the EvidenceDrawer FAB to mount (Evolu query needs a moment after navigation)
- extendedWaitUntil:
    visible: "Add evidence"
    timeout: 15000
# Add a text note via the FAB → FABMenu → CaptureTextNote path.
# CaptureTextNote's footer is inside KeyboardAvoidingView, so Save Note rises
# with the soft keyboard and is tappable without dismissing it first.
- tapOn: "Add evidence"
- tapOn: "Note"
- assertVisible: "Write a Note"
- inputText: "Found a better way to organize the section"
- tapOn: "Save Note"
- assertVisible: "Focus Mode"

# Close the EvidenceDrawer before tapping the StepCard's checkbox.
# Returning from CaptureTextNote leaves the drawer expanded, and its dim
# overlay captures taps at the StepCard's screen position even though
# Maestro can match the checkbox by accessibility hierarchy.
- tapOn: "Toggle evidence drawer"

# Complete the step — triggers auto-navigation to CompletionFlow after 400ms
- tapOn: "Mark complete"
- assertVisible: "One last thing!"

# Add a final goal-level note
- tapOn:
    id: "completion-note-input"
- inputText: "Finished organizing the section and wrote down what worked."
# Dismiss the soft keyboard by tapping the static header — Maestro's `hideKeyboard`
# cannot find a dismiss affordance here, and the keyboard intercepts the save tap.
- tapOn: "One last thing!"
- tapOn: "Save Note"
# Flow ends after Save Note — the celebration screen + BadgeEarnedModal appear next,
# but RN Modal renders in a separate iOS window that Maestro cannot access.
# Save Note completing successfully proves the entire goal lifecycle works.
