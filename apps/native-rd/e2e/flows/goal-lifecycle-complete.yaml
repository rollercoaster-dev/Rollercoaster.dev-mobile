appId: dev.rollercoaster.app
---
# Goal lifecycle flow — create goal, choose badge design, add step, complete step with evidence, and save final goal evidence note
# Status: required
# Criteria: stable feature, outcome assertions at each transition, deterministic selectors for lifecycle actions
- launchApp:
    clearState: true
    clearKeychain: true
# Expo SDK 55 dev-client lands on its server picker after clearState
# instead of auto-reloading the last bundle. Bypass via the dev-client
# deep-link scheme `exp+<slug>://expo-development-client/?url=<bundle-url>`.
# Onboarding hint + dev-menu modals are pre-disabled in run-e2e.sh.
- openLink: "exp+rollercoasterdev://expo-development-client/?url=http%3A%2F%2Flocalhost%3A8081"
- assertVisible: "Welcome to your ride."
- tapOn: "The Full Ride. Standard theme"
- tapOn: "Get Started"
- assertVisible: "Goals"
- tapOn:
    id: "tab-fab-new-goal"
- assertVisible: "New Goal"
- tapOn:
    id: "new-goal-title"
- inputText: "Plan community archive exhibit"
- tapOn:
    id: "create-goal"
- assertVisible: "Design Badge"
- scrollUntilVisible:
    element:
      id: "use-this-design"
    direction: DOWN
- tapOn:
    id: "use-this-design"
- assertVisible: "Edit Goal"
- tapOn:
    id: "step-list-new-step-input"
- inputText: "Draft exhibit outline"
- tapOn:
    id: "step-list-add-step-button"
- assertVisible: "Draft exhibit outline"
- assertVisible: "1 step"
- hideKeyboard
- scrollUntilVisible:
    element:
      id: "start-working"
    direction: DOWN
- tapOn:
    id: "start-working"
- assertVisible: "Focus Mode"
# Add a text note via the FAB → FABMenu → CaptureTextNote path.
# CaptureTextNote's footer is inside KeyboardAvoidingView, so Save Note rises
# with the soft keyboard and is tappable without dismissing it first.
- extendedWaitUntil:
    visible: "Add evidence"
    timeout: 15000
- tapOn: "Add evidence"
- tapOn: "Note"
- assertVisible: "Write a Note"
- inputText: "Outlined the key sections and supporting artifacts."
- tapOn: "Save Note"
- assertVisible: "Focus Mode"
# Close the EvidenceDrawer before tapping the StepCard's checkbox.
# Returning from CaptureTextNote leaves the drawer expanded, and its dim
# overlay captures taps at the StepCard's screen position even though
# Maestro can match the checkbox by accessibility hierarchy.
- tapOn: "Toggle evidence drawer"
- tapOn:
    text: "Mark complete.*"
- assertVisible:
    id: "completion-note-input"
- tapOn:
    id: "completion-note-input"
- inputText: "Finished the archive exhibit plan and documented the result."
# Dismiss the soft keyboard by tapping the static header — Maestro's `hideKeyboard`
# cannot find a dismiss affordance here, and the keyboard intercepts the save tap.
- tapOn: "One last thing!"
- scrollUntilVisible:
    element:
      id: "completion-save-note-button"
    direction: DOWN
- tapOn:
    id: "completion-save-note-button"
# Assert on the BadgeEarnedModal's rendered image testID. The modal auto-
# appears once badgeStatus === "done" and occludes the celebration headline.
# In E2E mode the outer card's a11y grouping is dropped (EXPO_PUBLIC_E2E_MODE
# gate), so the nested testID is reachable. `badge-earned-image` is only
# rendered on the non-placeholder branch (imageUri !== PLACEHOLDER_IMAGE_URI),
# so asserting on it proves the whole pipeline: save → evidence persisted →
# phase transitioned → badge created AND baked to a real PNG (not the solid-
# color fallback).
- extendedWaitUntil:
    visible:
      id: "badge-earned-image"
    timeout: 15000
