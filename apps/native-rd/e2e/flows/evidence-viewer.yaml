appId: dev.rollercoaster.app
---
# Evidence viewer flow — capture mixed-type evidence, open the Timeline,
# tap an item to push EvidenceViewerScreen, switch via the thumbnail strip,
# then back out to Timeline.
- clearState
- launchApp
# Expo SDK 55 dev-client lands on its server picker after clearState
# instead of auto-reloading the last bundle. Bypass via the dev-client
# deep-link scheme `exp+<slug>://expo-development-client/?url=<bundle-url>`.
# Onboarding hint + dev-menu modals are pre-disabled in run-e2e.sh.
- openLink: "exp+rollercoasterdev://expo-development-client/?url=http%3A%2F%2Flocalhost%3A8081"
- assertVisible: "Welcome to your ride."
- tapOn: "The Full Ride. Standard theme"
- tapOn: "Get Started"
- assertVisible: "Goals"

# Create a goal
- tapOn:
    id: "tab-fab-new-goal"
- assertVisible: "New Goal"
- tapOn: "What do you want to learn?"
- inputText: "Curate evidence demo"
- tapOn: "Create Goal"

# Badge designer → use default
- assertVisible: "Design Badge"
- scrollUntilVisible:
    element: "Use This Design"
    direction: DOWN
    timeout: 10000
- tapOn: "Use This Design"

# Edit mode — add a step
- assertVisible: "Edit Goal"
- tapOn:
    id: "step-list-new-step-input"
- inputText: "Capture mixed evidence"
- pressKey: Enter
- assertVisible: "1 step"
- hideKeyboard

# Enter Focus Mode
- scrollUntilVisible:
    element: "Start Working"
    direction: DOWN
    timeout: 10000
- tapOn: "Start Working"
- assertVisible: "Focus Mode"

# Add a text note via the FAB → FABMenu → CaptureTextNote path.
# CaptureTextNote's footer is inside KeyboardAvoidingView, so Save Note rises
# with the soft keyboard and is tappable without dismissing it first.
- extendedWaitUntil:
    visible: "Add evidence"
    timeout: 15000
- tapOn: "Add evidence"
- tapOn: "Note"
- assertVisible: "Write a Note"
- inputText: "First piece of evidence"
- tapOn: "Save Note"
- assertVisible: "Focus Mode"

# Add a second text note. Both items are text type, so the viewer only
# exercises the text branch in this flow; non-text branches are covered by
# unit tests on EvidenceContent.
- tapOn: "Add evidence"
- tapOn: "Note"
- assertVisible: "Write a Note"
- inputText: "Second piece of evidence"
- tapOn: "Save Note"
- assertVisible: "Focus Mode"

# Close the EvidenceDrawer so its dim overlay doesn't capture the next tap
# on the MiniTimeline above it.
- tapOn: "Toggle evidence drawer"

# Open the Timeline view via MiniTimeline's tap-to-expand affordance
- tapOn: "Tap to expand timeline"
- assertVisible: "Timeline"

# Expand the step row so its evidence cards are visible
- tapOn:
    text: "Capture mixed evidence.*"

# Tap the first evidence card → EvidenceViewerScreen pushes in
- tapOn:
    text: "First piece of evidence"
- assertVisible: "Evidence"
- assertVisible: "1 / 2"

# Tap the other thumbnail to switch active item
- tapOn:
    text: ".*Second piece of evidence.*"
- assertVisible: "2 / 2"

# Back to Timeline
- tapOn: "Go back"
- assertVisible: "Timeline"
- assertVisible: "First piece of evidence"
