version: 2
updates:
  # Root package.json and bun.lock
  # Dependabot now natively supports Bun (GA Feb 2025)
  - package-ecosystem: "bun"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    groups:
      dev-dependencies:
        patterns:
          - "*"
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
      production-dependencies:
        patterns:
          - "*"
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"
    ignore:
      # Jest 30.4.x has a regression where jest-runtime.resetModules
      # calls _moduleMocker.clearMocksOnScope without checking existence,
      # breaking the ModuleMocker shipped via react-native/jest/react-native-env.js.
      # Revisit once jest 30.5 lands.
      - dependency-name: "jest"
        versions: ["30.4.x"]
      - dependency-name: "babel-jest"
        versions: ["30.4.x"]
      # React Native ecosystem: must be bumped in coordination with the Expo SDK,
      # not piecemeal by Dependabot. Expo's jest preset asserts exact-match peers
      # (react / react-test-renderer) and the RN install layout changes between
      # minor versions, breaking the jest setup path. Bump manually via SDK upgrades.
      - dependency-name: "react-test-renderer"
      - dependency-name: "react-native"
      - dependency-name: "react-native-reanimated"
      - dependency-name: "react-native-worklets"
      - dependency-name: "react"
      - dependency-name: "react-dom"
      - dependency-name: "expo"
        update-types: ["version-update:semver-major"]
      - dependency-name: "expo-*"
        update-types: ["version-update:semver-major"]
      # Expo-SDK-aligned packages whose names don't match `expo-*` glob:
      # these must bump in lockstep with the Expo SDK, not piecemeal.
      - dependency-name: "babel-preset-expo"
        update-types: ["version-update:semver-major"]
      - dependency-name: "jest-expo"
        update-types: ["version-update:semver-major"]
      - dependency-name: "eslint-config-expo"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@react-native-async-storage/async-storage"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@react-navigation/*"
        update-types: ["version-update:semver-major"]
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore(deps):"
      include: "scope"
    open-pull-requests-limit: 10
    rebase-strategy: "auto"

  # GitHub Actions workflow dependencies
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "chore(ci):"
      include: "scope"
    open-pull-requests-limit: 5
    rebase-strategy: "auto"
