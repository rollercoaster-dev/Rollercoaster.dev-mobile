version: 2
updates:
  # Root package.json and bun.lock
  # Dependabot now natively supports Bun (GA Feb 2025)
  - package-ecosystem: "bun"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    groups:
      dev-dependencies:
        patterns:
          - "*"
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
      production-dependencies:
        patterns:
          - "*"
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"
    ignore:
      # Jest 30.4.x has a regression where jest-runtime.resetModules
      # calls _moduleMocker.clearMocksOnScope without checking existence,
      # breaking the ModuleMocker shipped via react-native/jest/react-native-env.js.
      # Revisit once jest 30.5 lands.
      - dependency-name: "jest"
        versions: ["30.4.x"]
      - dependency-name: "babel-jest"
        versions: ["30.4.x"]
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore(deps):"
      include: "scope"
    open-pull-requests-limit: 10
    rebase-strategy: "auto"

  # GitHub Actions workflow dependencies
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "chore(ci):"
      include: "scope"
    open-pull-requests-limit: 5
    rebase-strategy: "auto"
