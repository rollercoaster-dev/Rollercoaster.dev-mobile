name: DCO

on:
  pull_request:
    branches: [main]
    paths:
      - "apps/native-rd/**"
      - "packages/openbadges-core/**"
      - "packages/design-tokens/**"
      - ".github/workflows/**"
      - "LICENSING.md"

permissions:
  contents: read

jobs:
  dco-check:
    name: Verify Signed-off-by
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check for Signed-off-by lines
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          # List non-merge commits in the PR
          commits=$(git log --no-merges --format='%H' "${BASE_SHA}..${HEAD_SHA}")
          missing=""

          for sha in $commits; do
            if ! git show -s --format=%B "$sha" | grep -qE "^Signed-off-by: .+ <.+@.+>$"; then
              subject=$(git show -s --format=%s "$sha")
              missing="${missing}${sha} ${subject}"$'\n'
            fi
          done

          if [ -n "$missing" ]; then
            echo "::error::The following commits are missing a 'Signed-off-by:' trailer (DCO)."
            echo "$missing"
            echo "Fix locally by amending the commits with 'git commit --amend --signoff'"
            echo "or re-creating them with 'git commit -s'. See LICENSING.md for context."
            exit 1
          fi

          echo "All commits have valid Signed-off-by trailers."
