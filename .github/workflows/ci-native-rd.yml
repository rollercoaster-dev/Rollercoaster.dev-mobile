# Validation contract: docs/architecture/ci-contract.md
name: ci-native-rd

on:
  pull_request:
    paths:
      - "apps/native-rd/**"
      - "!apps/native-rd/docs/**"
      - "!apps/native-rd/research/**"
      - "!apps/native-rd/prototypes/**"
      - "packages/design-tokens/**"
      - "packages/openbadges-core/**"
      - "bun.lock"
      - "bunfig.toml"
      - "turbo.json"
      - "package.json"
      - ".prettierignore"
      - ".github/workflows/ci-native-rd.yml"
  push:
    branches: [main]

concurrency:
  group: ci-native-rd-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: Native-RD Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: "package.json"

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: "apps/native-rd/.nvmrc"

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Cache turbo
        uses: actions/cache@v5
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-native-rd-${{ hashFiles('bun.lock', '.github/workflows/ci-native-rd.yml') }}
          restore-keys: |
            ${{ runner.os }}-turbo-native-rd-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Format check
        run: bun run format:check

      - name: Typecheck
        run: bun run turbo type-check --filter=native-rd

      - name: Lint
        run: bun run turbo lint --filter=native-rd

      - name: Test (with coverage)
        working-directory: apps/native-rd
        run: bun run test:ci -- --coverage --coverageReporters=lcov

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        continue-on-error: true
        with:
          files: apps/native-rd/coverage/lcov.info
          flags: native-rd
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

      - name: a11y audit
        if: always()
        working-directory: apps/native-rd
        run: bun run test:a11y:json > a11y.json

      - name: Upload a11y artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: a11y-audit
          path: apps/native-rd/a11y.json
          if-no-files-found: warn

      - name: Storybook web build
        working-directory: apps/native-rd
        run: bun run storybook:web:build
