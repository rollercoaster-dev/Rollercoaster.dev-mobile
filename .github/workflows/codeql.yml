name: CodeQL Security Scanning

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run weekly on Sunday at midnight UTC
    - cron: "0 0 * * 0"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze JavaScript/TypeScript
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: "package.json"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          # Use default query suite for balanced coverage
          # queries: security-extended  # Uncomment for more comprehensive scanning (may increase false positives)
          # Design-exploration prototype bundles are HTML snapshots + copied-in stale
          # screen code, not maintained/shipped source. Their custom {{ }} template DSL
          # trips CodeQL's embedded-JS extractor (false-positive "expression has no
          # effect" on onClick bindings). Excluded here to mirror the eslint + prettier
          # ignores of the same tree (apps/native-rd/eslint.config.js, .prettierignore).
          config: |
            paths-ignore:
              - 'apps/native-rd/prototypes/**'

      - name: Build workspace
        run: bun run build

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:javascript-typescript"
