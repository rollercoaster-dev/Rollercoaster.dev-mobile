name: build-production

# Two triggers — both human-gated:
#  - `release: published` — release-please creates GitHub Releases as drafts
#    (see .github/release-please-config.json: "draft": true). The "ship button"
#    is clicking **Publish release** on the draft in the Releases UI. That click
#    is the moment you decide to ship; this workflow does the rest.
#  - `workflow_dispatch` — escape hatch for rebuilding a past tag or shipping
#    from a non-release ref. Supply `ref` via the Actions UI or `gh workflow run`.
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build (tag or commit SHA)"
        required: true
      platform:
        description: "Platform to build and submit."
        required: false
        default: all
        type: choice
        options:
          - all
          - ios
          - android

concurrency:
  group: build-production-${{ inputs.ref || github.event.release.tag_name || github.ref }}-${{ inputs.platform || 'all' }}
  cancel-in-progress: false

# Pin eas-cli to avoid silent breakage when upstream tightens flag validation.
# v20.0.0 (2026-06) moved `--what-to-test` to require `--auto-submit`/submit-side.
# Bump deliberately: read eas-cli release notes, run an internal build first.
env:
  EAS_CLI_VERSION: "20.0.0"

jobs:
  validate:
    uses: ./.github/workflows/_release-validate.yml
    with:
      ref: ${{ inputs.ref || github.event.release.tag_name || github.ref }}
      lint-release-notes: true

  build-ios:
    needs: validate
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.platform == 'all' || inputs.platform == 'ios' }}
    runs-on: ubuntu-latest
    outputs:
      build_id: ${{ steps.build.outputs.build_id }}
    defaults:
      run:
        working-directory: apps/native-rd
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.event.release.tag_name || github.ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: "package.json"

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: bun install --frozen-lockfile
        working-directory: .

      # release-notes artifacts (what-to-test.txt, store.config.json) are only
      # consumed by `eas submit`, so they live in the submit-ios job. Sentry
      # sourcemaps for the build come from the Expo Sentry plugin via
      # SENTRY_AUTH_TOKEN — no artifact files needed here.

      - name: Build (EAS, production profile, iOS)
        id: build
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: |
          # Write JSON outside the repo: `cmd > file` opens the file before
          # eas-cli runs, and eas-cli aborts on a dirty working tree.
          set -euo pipefail
          out="$RUNNER_TEMP/eas-build-ios.json"
          npx "eas-cli@$EAS_CLI_VERSION" build --profile production --platform ios --non-interactive --json > "$out"
          build_id="$(jq -r 'if type == "array" then .[0].id else .id end' "$out")"
          test -n "$build_id" && test "$build_id" != "null"
          echo "build_id=$build_id" >> "$GITHUB_OUTPUT"

  build-android:
    needs: validate
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.platform == 'all' || inputs.platform == 'android' }}
    runs-on: ubuntu-latest
    outputs:
      build_id: ${{ steps.build.outputs.build_id }}
    defaults:
      run:
        working-directory: apps/native-rd
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.event.release.tag_name || github.ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: "package.json"

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: bun install --frozen-lockfile
        working-directory: .

      - name: Build (EAS, production profile, Android)
        id: build
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: |
          # Write JSON outside the repo: `cmd > file` opens the file before
          # eas-cli runs, and eas-cli aborts on a dirty working tree.
          out="$RUNNER_TEMP/eas-build-android.json"
          npx "eas-cli@$EAS_CLI_VERSION" build --profile production --platform android --non-interactive --json > "$out"
          build_id="$(jq -r 'if type == "array" then .[0].id else .id end' "$out")"
          test -n "$build_id" && test "$build_id" != "null"
          echo "build_id=$build_id" >> "$GITHUB_OUTPUT"

  submit-ios:
    needs: build-ios
    if: ${{ always() && needs.build-ios.result == 'success' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/native-rd
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.event.release.tag_name || github.ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: "package.json"

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: bun install --frozen-lockfile
        working-directory: .

      - name: Read version
        id: version
        run: echo "value=$(jq -r .version package.json)" >> "$GITHUB_OUTPUT"

      - name: Write credential files
        # Pass secrets via env (not ${{ secrets.* }} inside the script body) so
        # arbitrary content — newlines, quotes, backslashes — stays inside the
        # shell variable instead of being expanded into the script source.
        # Trailing newline is appended for the PEM key per Apple/OpenSSL
        # parser expectations; harmless on the JSON.
        env:
          APPLE_ASC_KEY_P8: ${{ secrets.APPLE_ASC_KEY_P8 }}
          ANDROID_PLAY_SA: ${{ secrets.ANDROID_PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          mkdir -p ../../secrets
          printf '%s\n' "$APPLE_ASC_KEY_P8" > ../../secrets/asc-api-key.p8
          printf '%s\n' "$ANDROID_PLAY_SA" > ../../secrets/play-service-account.json
          chmod 600 ../../secrets/asc-api-key.p8 ../../secrets/play-service-account.json

      # Regenerate store.config.json from this version's testing-notes file
      # so the iOS submit profile's metadataPath (./store.config.json in
      # eas.json) resolves. Same logic as the build-ios prepare step — kept
      # local because jobs don't share filesystem state.
      - name: Generate release-notes artifacts
        run: |
          set -euo pipefail
          VERSION="$(jq -r .version package.json)"
          NOTES="docs/release/testing-notes/${VERSION}.md"
          mkdir -p .release-artifacts
          if [ ! -f "$NOTES" ]; then
            echo "::warning::No testing notes at $NOTES — store metadata falls back to store.config.base.json."
            cp store.config.base.json store.config.json
            exit 0
          fi
          bun run release-notes:split

      - name: Submit (EAS, production profile, iOS)
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          APPLE_ASC_KEY_ID: ${{ secrets.APPLE_ASC_KEY_ID }}
          APPLE_ASC_ISSUER_ID: ${{ secrets.APPLE_ASC_ISSUER_ID }}
        # TestFlight "What to Test" must be entered manually in App Store
        # Connect: EAS gates the equivalent --what-to-test / changelog field
        # behind their Enterprise plan, so passing it fails the submission
        # outright. The split notes still live in .release-artifacts/ for
        # copy-paste; see docs/release.md.
        run: npx "eas-cli@$EAS_CLI_VERSION" submit --profile production --platform ios --id "${{ needs.build-ios.outputs.build_id }}" --non-interactive --wait

  submit-android:
    needs: build-android
    if: ${{ always() && needs.build-android.result == 'success' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/native-rd
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.event.release.tag_name || github.ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: "package.json"

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: bun install --frozen-lockfile
        working-directory: .

      - name: Read version
        id: version
        run: echo "value=$(jq -r .version package.json)" >> "$GITHUB_OUTPUT"

      - name: Write credential files
        env:
          APPLE_ASC_KEY_P8: ${{ secrets.APPLE_ASC_KEY_P8 }}
          ANDROID_PLAY_SA: ${{ secrets.ANDROID_PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          mkdir -p ../../secrets
          printf '%s\n' "$APPLE_ASC_KEY_P8" > ../../secrets/asc-api-key.p8
          printf '%s\n' "$ANDROID_PLAY_SA" > ../../secrets/play-service-account.json
          chmod 600 ../../secrets/asc-api-key.p8 ../../secrets/play-service-account.json

      - name: Submit (EAS, production profile, Android, 10% rollout)
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: npx "eas-cli@$EAS_CLI_VERSION" submit --profile production --platform android --id "${{ needs.build-android.outputs.build_id }}" --non-interactive --wait

  finalize-sentry:
    needs:
      - build-ios
      - build-android
      - submit-ios
      - submit-android
    if: ${{ always() && !cancelled() && !contains(needs.*.result, 'failure') && (needs.submit-ios.result == 'success' || needs.submit-android.result == 'success') }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/native-rd
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.event.release.tag_name || github.ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: "package.json"

      - name: Install dependencies
        run: bun install --frozen-lockfile
        working-directory: .

      # The Sentry React Native SDK names releases <bundleId>@<version>+<buildNumber>
      # and creates them lazily on the first runtime event — so right after submit the
      # release usually does not exist yet, and a bare "<version>" never matches. The
      # iOS buildNumber and Android versionCode also differ, so there is no single name.
      # Resolve each shipped build's real version + buildNumber from its EAS build record
      # and create-or-finalize the correctly-named release per platform. `releases new`
      # is idempotent; identical names (when build numbers are in sync) are deduped so we
      # don't emit duplicate deploy markers.
      #
      # Note: this only writes the release + deploy marker. Symbolication depends on
      # build-time sourcemap upload, which is tracked separately.
      - name: Finalize Sentry releases
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: rollercoasterdev
          SENTRY_PROJECT: native-rd
          IOS_BUILD_ID: ${{ needs.build-ios.outputs.build_id }}
          ANDROID_BUILD_ID: ${{ needs.build-android.outputs.build_id }}
        run: |
          set -euo pipefail
          IOS_BUNDLE_ID="$(jq -r '.expo.ios.bundleIdentifier' app.json)"
          ANDROID_BUNDLE_ID="$(jq -r '.expo.android.package' app.json)"
          finalized=""

          finalize() {
            local build_id="$1" bundle_id="$2" info ver num rel
            if [ -z "$build_id" ] || [ "$build_id" = "null" ]; then
              echo "No build id for $bundle_id — skipping (platform not built this run)."
              return 0
            fi
            info="$(npx --yes "eas-cli@$EAS_CLI_VERSION" build:view "$build_id" --json)"
            ver="$(echo "$info" | jq -r '.appVersion')"
            num="$(echo "$info" | jq -r '.appBuildVersion')"
            rel="${bundle_id}@${ver}+${num}"
            case " $finalized " in
              *" $rel "*)
                echo "Already finalized $rel — skipping duplicate."
                return 0
                ;;
            esac
            finalized="$finalized $rel"
            echo "Finalizing Sentry release: $rel"
            npx --yes @sentry/cli@latest releases new "$rel"
            npx --yes @sentry/cli@latest releases finalize "$rel"
            npx --yes @sentry/cli@latest releases deploys "$rel" new --env production
          }

          finalize "${IOS_BUILD_ID:-}" "$IOS_BUNDLE_ID"
          finalize "${ANDROID_BUILD_ID:-}" "$ANDROID_BUNDLE_ID"
