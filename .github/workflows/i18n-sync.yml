# Diff-aware en→de i18n sync. See apps/native-rd/docs/plans/i18n-llm-sync.md.
name: i18n-sync

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - "apps/native-rd/src/i18n/resources/en/**"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    name: Sync de/ from en/
    runs-on: ubuntu-latest
    # Fork-PR guard (D2) + draft guard (D7) + loop-prevention guard (D3).
    if: >-
      github.actor != 'github-actions[bot]'
      && (
        github.event_name == 'workflow_dispatch'
        || (
          github.event.pull_request.head.repo.full_name == github.repository
          && !github.event.pull_request.draft
        )
      )
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref || github.ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: "package.json"

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: "apps/native-rd/.nvmrc"

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run i18n sync
        working-directory: apps/native-rd
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: bun run i18n:sync

      - name: Check for de/ diff
        id: diff
        run: |
          git add apps/native-rd/src/i18n/resources/de/
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit de/ translations to PR branch
        if: steps.diff.outputs.changed == 'true' && github.event_name == 'pull_request'
        run: |
          git -c user.name="github-actions[bot]" \
              -c user.email="41898282+github-actions[bot]@users.noreply.github.com" \
              commit -s -m "chore(native-rd/i18n): sync de/ translations [skip ci]"
          git push

      - name: Open PR with de/ translations (manual run)
        if: steps.diff.outputs.changed == 'true' && github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="bot/i18n-sync-$(date -u +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH"
          git -c user.name="github-actions[bot]" \
              -c user.email="41898282+github-actions[bot]@users.noreply.github.com" \
              commit -s -m "chore(native-rd/i18n): full-corpus sync de/ translations [skip ci]"
          git push --set-upstream origin "$BRANCH"
          gh pr create \
            --base "${{ github.ref_name }}" \
            --head "$BRANCH" \
            --title "chore(native-rd/i18n): full-corpus de/ sync" \
            --body "Automated full-corpus sync triggered manually via \`workflow_dispatch\` on \`${{ github.ref_name }}\`. Review the diff and merge if the translations look right."
