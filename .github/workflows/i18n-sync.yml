# Diff-aware en→de i18n sync. See apps/native-rd/docs/plans/i18n-llm-sync.md.
name: i18n-sync

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - "apps/native-rd/src/i18n/resources/en/**"
  workflow_dispatch:

concurrency:
  group: i18n-sync-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

# Default to no permissions at the workflow level. Each job grants only what
# its steps actually need (D9 — least-privilege split).
permissions: {}

jobs:
  # PR-triggered sync: receives OPENROUTER_API_KEY, so it carries the minimum
  # scope needed to push the de/ commit back to the PR branch. No pull-requests
  # write — that scope only exists on the workflow_dispatch path.
  sync-pr:
    name: Sync de/ from en/ (PR)
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'pull_request'
      && github.actor != 'github-actions[bot]'
      && github.event.pull_request.head.repo.full_name == github.repository
      && !github.event.pull_request.draft
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: "package.json"

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version-file: "apps/native-rd/.nvmrc"

      - name: Cache Bun dependencies
        uses: actions/cache@v6
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run i18n sync
        working-directory: apps/native-rd
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: bun run i18n:sync

      - name: Check for de/ diff
        id: diff
        run: |
          set -euo pipefail
          git add apps/native-rd/src/i18n/resources/de/
          set +e
          git diff --cached --quiet
          rc=$?
          set -e
          case "$rc" in
            0) echo "changed=false" >> "$GITHUB_OUTPUT" ;;
            1) echo "changed=true" >> "$GITHUB_OUTPUT" ;;
            *) echo "::error::git diff --cached failed with exit $rc" >&2; exit "$rc" ;;
          esac

      - name: Commit de/ translations to PR branch
        if: steps.diff.outputs.changed == 'true'
        run: |
          git -c user.name="github-actions[bot]" \
              -c user.email="41898282+github-actions[bot]@users.noreply.github.com" \
              commit -s -m "chore(native-rd/i18n): sync de/ translations"
          git push

  # Manual full-corpus sync. Opens a PR via `gh pr create`, so this job needs
  # `pull-requests: write` in addition to `contents: write`. The secret is
  # exposed here too, but the job runs from a trusted ref the dispatcher chose
  # (only users with write access can dispatch), so PR-author-controlled code
  # is not part of the threat model on this path.
  sync-dispatch:
    name: Sync de/ from en/ (manual full-corpus)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.actor != 'github-actions[bot]'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: "package.json"

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version-file: "apps/native-rd/.nvmrc"

      - name: Cache Bun dependencies
        uses: actions/cache@v6
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run i18n sync
        working-directory: apps/native-rd
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: bun run i18n:sync

      - name: Check for de/ diff
        id: diff
        run: |
          set -euo pipefail
          git add apps/native-rd/src/i18n/resources/de/
          set +e
          git diff --cached --quiet
          rc=$?
          set -e
          case "$rc" in
            0) echo "changed=false" >> "$GITHUB_OUTPUT" ;;
            1) echo "changed=true" >> "$GITHUB_OUTPUT" ;;
            *) echo "::error::git diff --cached failed with exit $rc" >&2; exit "$rc" ;;
          esac

      - name: Open PR with de/ translations
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="bot/i18n-sync-$(date -u +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH"
          git -c user.name="github-actions[bot]" \
              -c user.email="41898282+github-actions[bot]@users.noreply.github.com" \
              commit -s -m "chore(native-rd/i18n): full-corpus sync de/ translations"
          git push --set-upstream origin "$BRANCH"
          gh pr create \
            --base "${{ github.ref_name }}" \
            --head "$BRANCH" \
            --title "chore(native-rd/i18n): full-corpus de/ sync" \
            --body "Automated full-corpus sync triggered manually via \`workflow_dispatch\` on \`${{ github.ref_name }}\`. Review the diff and merge if the translations look right."
