name: build-internal

# Manual-only: internal builds run when a human (or scheduled call)
# clicks "Run workflow" — they do not auto-trigger on push to main.
on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build (branch, tag, or commit SHA). Defaults to the current branch."
        required: false
        default: "main"

concurrency:
  group: build-internal
  cancel-in-progress: false

jobs:
  validate:
    uses: ./.github/workflows/_validate.yml

  build-and-submit:
    needs: validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/native-rd
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: "package.json"

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: bun install --frozen-lockfile
        working-directory: .

      - name: Write credential files
        # Append a trailing newline. PEM-encoded keys conventionally end with
        # a newline after -----END PRIVATE KEY-----, and some OpenSSL/JWT
        # parsers refuse to load a key without one. JSON parsers don't care
        # either way; adding the newline is harmless.
        run: |
          mkdir -p ../../secrets
          printf '%s\n' "${{ secrets.APPLE_ASC_KEY_P8 }}" > ../../secrets/asc-api-key.p8
          printf '%s\n' "${{ secrets.ANDROID_PLAY_SERVICE_ACCOUNT_JSON }}" > ../../secrets/play-service-account.json
          chmod 600 ../../secrets/asc-api-key.p8 ../../secrets/play-service-account.json

      - name: Build (EAS, preview profile, both platforms)
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: npx eas-cli@latest build --profile preview --platform all --non-interactive --no-wait

      - name: Submit (EAS, preview profile, both platforms — latest finished build)
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          APPLE_ASC_KEY_ID: ${{ secrets.APPLE_ASC_KEY_ID }}
          APPLE_ASC_ISSUER_ID: ${{ secrets.APPLE_ASC_ISSUER_ID }}
        run: npx eas-cli@latest submit --profile preview --platform all --latest --non-interactive --wait
