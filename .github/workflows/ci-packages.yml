# Validation contract: docs/architecture/ci-contract.md
name: ci-packages

on:
  pull_request:
    paths:
      - "packages/**"
      - "!packages/**/*.md"
      - "!packages/**/docs/**"
      - "bun.lock"
      - "bunfig.toml"
      - "turbo.json"
      - "package.json"
      - "tsconfig.json"
      - "eslint.config.mjs"
      - ".prettierignore"
      - ".github/workflows/ci-packages.yml"
  push:
    branches: [main]

concurrency:
  group: ci-packages-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: Packages Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: "package.json"

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Cache turbo
        uses: actions/cache@v5
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-packages-${{ hashFiles('bun.lock', '.github/workflows/ci-packages.yml') }}
          restore-keys: |
            ${{ runner.os }}-turbo-packages-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Format check
        run: bun run format:check

      - name: Typecheck packages
        run: bun run turbo type-check --filter='./packages/*'

      - name: Lint packages
        run: bun run turbo lint --filter='./packages/*'

      - name: Test packages
        run: bun run turbo test --filter='./packages/*'

      - name: Build packages
        run: bun run turbo build --filter='./packages/*'
