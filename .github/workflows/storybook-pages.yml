# Publishes the web Storybook to GitHub Pages.
# Build is mirrored from ci-native-rd.yml's "Storybook web build" step.
name: storybook-pages

on:
  push:
    branches: [main]
    # Mirror ci-native-rd.yml's native-rd surface so any input to the
    # Storybook build (components, stories, assets/fonts, tokens) redeploys.
    # Broad-but-idempotent beats enumerating sub-paths and going stale.
    paths:
      - "apps/native-rd/**"
      - "!apps/native-rd/docs/**"
      - "!apps/native-rd/research/**"
      - "!apps/native-rd/prototypes/**"
      - "packages/design-tokens/**"
      - "packages/openbadges-core/**"
      - "bun.lock"
      - ".github/workflows/storybook-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Don't cancel an in-flight deploy; queue the next one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Build & Deploy Storybook
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: "package.json"

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: "apps/native-rd/.nvmrc"

      - name: Cache Bun dependencies
        uses: actions/cache@v6
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # design-tokens emits build/unistyles/index.ts (gitignored), which
      # adapter.ts imports as "@rollercoaster-dev/design-tokens/unistyles".
      # ci-native-rd.yml gets this for free via turbo type-check's ^build dep;
      # this workflow calls storybook:web:build directly, so build it explicitly
      # or Rollup fails to resolve the import.
      - name: Build design-tokens
        run: bun run turbo build --filter=@rollercoaster-dev/design-tokens

      - name: Build web Storybook
        working-directory: apps/native-rd
        run: bun run storybook:web:build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/native-rd/.storybook-web-static

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
